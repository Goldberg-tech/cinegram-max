<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VAST Player</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#playerWrapper {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: #000;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: #000;
}

#clickOverlay {
  position: absolute;
  z-index: 10;
  cursor: default;
}

#videoControls {
  position: absolute;
  z-index: 20;
  pointer-events: none;
}

.ctrl-btn {
  position: absolute;
  pointer-events: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.9);
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.2); }

#closeBtn {
  top: 28px; right: 12px;
  width: 30px; height: 30px;
  font-size: 14px;
}

#muteBtn {
  bottom: 12px; left: 12px;
  width: 36px; height: 36px;
  font-size: 17px;
}
#muteBtn.muted { border-color: rgba(255,100,100,0.7); }

#skipBtn {
  bottom: 12px; right: 12px;
  width: auto; height: 34px;
  border-radius: 8px;
  padding: 0 14px;
  font-size: 13px;
  display: none;
  pointer-events: auto;
  z-index: 30;
}

#visitBtn {
  bottom: 54px; right: 12px;
  width: auto; height: 34px;
  border-radius: 8px;
  padding: 0 14px;
  font-size: 13px;
  display: none;
  pointer-events: auto;
  z-index: 30;
}

/* LOG PANEL */
#logPanel {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 2000;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
#logPanel.open { transform: translateY(0); }

#logOpenBtn {
  position: fixed;
  bottom: 6px;
  left: 6px;
  width: 22px;
  height: 22px;
  background: rgba(255,255,255,0.08);
  border: none;
  border-radius: 4px;
  color: rgba(255,255,255,0.25);
  font-size: 10px;
  cursor: pointer;
  z-index: 1500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

#logHeader {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}
#logTitle { color: rgba(255,255,255,0.9); font-size: 14px; font-weight: bold; }
#logControls { display: flex; gap: 10px; align-items: center; }
#logDownload {
  color: rgba(100,210,140,0.8); font-size: 12px; cursor: pointer;
  padding: 3px 10px; border: 1px solid rgba(100,210,140,0.3); border-radius: 10px;
}
#logClear {
  color: rgba(255,100,100,0.8); font-size: 12px; cursor: pointer;
  padding: 3px 10px; border: 1px solid rgba(255,100,100,0.3); border-radius: 10px;
}
#logClose { color: rgba(255,255,255,0.6); font-size: 22px; cursor: pointer; line-height: 1; }

#logBody {
  flex: 1; overflow-y: auto; padding: 4px 0;
  font-family: 'Courier New', monospace; font-size: 11px;
}
.log-entry {
  display: flex; gap: 8px; padding: 5px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  word-break: break-all; line-height: 1.5;
}
.log-entry:last-child { border-bottom: none; }
.log-time { color: rgba(255,255,255,0.28); flex-shrink: 0; font-size: 10px; padding-top: 2px; min-width: 60px; }
.log-msg  { flex: 1; }
.log-info  { color: rgba(160,210,255,0.9); }
.log-ok    { color: rgba(100,220,130,0.9); }
.log-warn  { color: rgba(255,210,80,0.9); }
.log-error { color: rgba(255,100,100,0.95); font-weight: bold; }
.log-debug { color: rgba(170,170,170,0.6); }
.log-vast  { color: rgba(190,150,255,0.9); }
.log-pool  { color: rgba(255,180,80,0.85); }

/* LOADER */
#loader {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #000; z-index: 500; transition: opacity 0.4s;
}
#loader.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: rgba(255,255,255,0.7);
  border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader p { color: rgba(255,255,255,0.5); font-size: 13px; }

</style>
</head>
<body>

<div id="playerWrapper">

  <div id="loader">
    <div class="spinner"></div>
    <p>Загрузка рекламы...</p>
  </div>

  <video id="video" playsinline></video>

  <div id="clickOverlay"></div>

  <div id="videoControls">
    <div id="closeBtn" class="ctrl-btn">✕</div>
    <div id="muteBtn" class="ctrl-btn">🔊</div>
    <div id="skipBtn" class="ctrl-btn">Пропустить →</div>
    <div id="visitBtn" class="ctrl-btn">Перейти</div>
  </div>

  <button id="logOpenBtn" title="Логи">≡</button>
  <div id="logPanel">
    <div id="logHeader">
      <div id="logTitle">📋 Лог событий</div>
      <div id="logControls">
        <div id="logDownload">скачать</div>
        <div id="logClear">очистить</div>
        <div id="logClose">✕</div>
      </div>
    </div>
    <div id="logBody"></div>
  </div>

</div>

<script>

/* ============================================================
   КОНФИГ
   ============================================================ */
const CONFIG = {
  adsPerDevice:   3,       // 3 показа на device до cooldown
  poolSize:       50,
  cooldownMs:     30 * 24 * 60 * 60 * 1000, // 30 дней

  // ЧАСТОТА ПОКАЗА CREATIVE:
  // Лимит Wink: 8 показов/мес на одного юзера на один creative.
  // Нам нужно быть явно ниже лимита — используем 4 как "мягкий потолок",
  // при 6+ риск попасть во фрод-детектор по частоте.
  maxCreativeShowsPerDevice: 4,  // максимум 4 показа одного creative на device
  // Глобальный счётчик creative (все device): не более 8 за скользящий месяц
  maxCreativeShowsGlobal: 8,

  skipDelaySec:   12,

  // АВТОПРОПУСК — имитация реального поведения пользователя
  // Распределение моментов пропуска (в % от длины ролика):
  //   95% роликов: пропуск после 80%+ (или досмотр до конца)
  //    4% роликов: пропуск на 50–79% (посмотрел больше половины)
  //    1% роликов: пропуск на 12–49% (нетерпеливый, но кнопка уже доступна)
  // Итого VTR ~95–96%, доля <80% не более 5% — в рамках KPI Wink (≥80% VTR)
  autoSkip: {
    // Вероятности сегментов (сумма = 1.0)
    segments: [
      { prob: 0.95, minPct: 0.80, maxPct: 1.00, label: "full-view" },   // досмотр / пропуск после 80%
      { prob: 0.04, minPct: 0.50, maxPct: 0.79, label: "mid-skip" },    // пропуск после середины
      { prob: 0.01, minPct: 0.12, maxPct: 0.49, label: "early-skip" },  // ранний пропуск
    ],
    // Внутри сегмента full-view: доля тех кто реально досматривает (не нажимает skip вообще)
    // Остальные нажимают skip именно после 80% — тоже засчитывается как VTR
    fullViewWatchRatio: 0.55,  // 55% из "полных" — досматривают до ended, 45% — скипают после 80%
  },
  fetchTimeoutMs: 8000,
  maxRetries:     3,
  retryDelayMs:   1500,
  noAdRetryMs:    2000,
  minPlayerW:     540,
  minPlayerH:     360,
  sheetsUrl:      "https://script.google.com/macros/s/AKfycbwmRLicIgCvj6RSYLqbFuxqkcNHqvDvPgTpeFQw-60X_O9-wVy9z5TWZo5iIEfQp4GAVQ/exec",
  sheetsEnabled:  true,
  sheetsTypes:    ["info", "ok", "warn", "error", "pool", "vast"],

  // Межсессионные паузы — имитируют естественное поведение (юзер листает контент)
  // Реальный пользователь не запрашивает следующую рекламу мгновенно
  minInterSessionMs: 800,   // минимум 0.8с между завершением и новым стартом
  maxInterSessionMs: 3500,  // максимум 3.5с (в среднем ~2с — близко к органике)
};

/* ============================================================
   ЭЛЕМЕНТЫ
   ============================================================ */
const video        = document.getElementById("video");
const clickOverlay = document.getElementById("clickOverlay");
const closeBtn     = document.getElementById("closeBtn");
const muteBtn      = document.getElementById("muteBtn");
const skipBtn      = document.getElementById("skipBtn");
const visitBtn     = document.getElementById("visitBtn");
const loader       = document.getElementById("loader");
const logPanel     = document.getElementById("logPanel");
const logBody      = document.getElementById("logBody");
const logClear     = document.getElementById("logClear");
const logClose     = document.getElementById("logClose");
const logDownload  = document.getElementById("logDownload");
const controls     = document.getElementById("videoControls");

/* ============================================================
   ПОЗИЦИОНИРОВАНИЕ КНОПОК ПОВЕРХ РЕАЛЬНОГО ВИДЕО
   ============================================================ */
function getVideoRect() {
  const vw = video.videoWidth  || video.clientWidth;
  const vh = video.videoHeight || video.clientHeight;
  const cw = video.clientWidth;
  const ch = video.clientHeight;
  if (!vw || !vh) return { x: 0, y: 0, w: cw, h: ch };
  const scale = Math.min(cw / vw, ch / vh);
  const w = vw * scale;
  const h = vh * scale;
  const x = (cw - w) / 2;
  const y = (ch - h) / 2;
  return { x, y, w, h };
}

function positionControls() {
  const { x, y, w, h } = getVideoRect();
  clickOverlay.style.left   = x + 'px';
  clickOverlay.style.top    = y + 'px';
  clickOverlay.style.width  = w + 'px';
  clickOverlay.style.height = h + 'px';
  controls.style.left   = x + 'px';
  controls.style.top    = y + 'px';
  controls.style.width  = w + 'px';
  controls.style.height = h + 'px';
}

window.addEventListener('resize', positionControls);
video.addEventListener('loadedmetadata', positionControls);
video.addEventListener('resize', positionControls);
requestAnimationFrame(positionControls);

/* ============================================================
   GOOGLE SHEETS
   ============================================================ */
let sheetsQueue   = [];
let sheetsSending = false;

async function sheetsSend(entry) {
  if (!CONFIG.sheetsEnabled) return;
  if (!CONFIG.sheetsTypes.includes(entry.type)) return;
  sheetsQueue.push(entry);
  if (!sheetsSending) sheetsFlush();
}

async function sheetsFlush() {
  if (sheetsQueue.length === 0) { sheetsSending = false; return; }
  sheetsSending = true;
  const entry = sheetsQueue[0];
  try {
    await fetch(CONFIG.sheetsUrl, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(entry)
    });
    sheetsQueue.shift();
  } catch(e) {
    sheetsQueue.shift();
  }
  setTimeout(sheetsFlush, 300);
}

/* ============================================================
   ЛОГГЕР
   ============================================================ */
let allLogs          = [];
let currentSessionId = 0;
let currentDeviceId  = "";
let globalPlayIndex  = parseInt(localStorage.getItem("vastGlobalIndex") || "0");

let statsAttempts = 0;
let statsSuccess  = 0;
let statsVpaid    = 0;
let statsFail     = 0;

function logStats() {
  const fillRate = statsAttempts > 0 ? Math.round(statsSuccess / statsAttempts * 100) : 0;
  log(`📊 Статистика: показов=${statsSuccess} | попыток=${statsAttempts} | fill=${fillRate}% | vpaid_skip=${statsVpaid} | провалов=${statsFail}`, 'info');
}

function ts() {
  const d = new Date();
  return d.toTimeString().slice(0,8) + '.' + String(d.getMilliseconds()).padStart(3,'0');
}

function log(msg, type = 'info') {
  const time = ts();
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${time}</span><span class="log-msg log-${type}">${msg}</span>`;
  logBody.appendChild(entry);
  logBody.scrollTop = logBody.scrollHeight;
  const record = { time, type, msg, session: currentSessionId, device: currentDeviceId ? '...'+currentDeviceId.slice(-6) : '', index: globalPlayIndex };
  allLogs.push(record);
  sheetsSend(record);
  while (logBody.children.length > 300) logBody.removeChild(logBody.firstChild);
}

const _origError = console.error;
console.error = (...args) => { log('CONSOLE: ' + args.join(' '), 'error'); _origError.apply(console, args); };
window.addEventListener('error', e => log(`JS ERROR: ${e.message} (${e.lineno})`, 'error'));
window.addEventListener('unhandledrejection', e => log(`UNHANDLED: ${e.reason}`, 'error'));

/* ============================================================
   ПАНЕЛЬ ЛОГОВ
   ============================================================ */
logClose.onclick = () => { logPanel.classList.remove('open'); };
document.getElementById('logOpenBtn').onclick = () => { logPanel.classList.add('open'); };
logClear.onclick = () => {
  logBody.innerHTML = ''; allLogs = [];
  log('Лог очищен', 'debug');
};
logDownload.onclick = () => {
  const lines = allLogs.map(r =>
    `[${r.time}] [${r.type.toUpperCase().padEnd(5)}] [s#${r.session}] [${r.device}] [i=${r.index}] ${r.msg}`
  ).join('\n');
  const blob = new Blob([lines], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `vast-log-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  log('Лог скачан', 'ok');
};

/* ============================================================
   ЗВУК
   ============================================================ */
let isMuted = false;

muteBtn.onclick = () => {
  isMuted = !isMuted;
  video.muted = isMuted;
  muteBtn.textContent = isMuted ? '🔇' : '🔊';
  muteBtn.classList.toggle('muted', isMuted);
  log(`Звук: ${isMuted ? 'выключен' : 'включён'}`, 'info');
  pingTracker(isMuted ? currentTrackers?.mute : currentTrackers?.unmute,
              isMuted ? 'mute' : 'unmute');
};

/* ============================================================
   CLICK THROUGH
   ============================================================ */
let currentClickUrl = null;

function openUrl(url) {
  log(`Переход по ссылке: ${url}`, 'ok');
  if (window.Telegram?.WebApp?.openLink) {
    window.Telegram.WebApp.openLink(url, { try_instant_view: true });
  } else {
    window.open(url, '_blank');
  }
}

function setClickUrl(url) {
  currentClickUrl = url;
  if (url) {
    visitBtn.style.display = 'flex';
    clickOverlay.style.cursor = 'pointer';
    log(`ClickThrough URL установлен`, 'info');
  } else {
    visitBtn.style.display = 'none';
    clickOverlay.style.cursor = 'default';
  }
}

clickOverlay.onclick = () => {
  if (currentClickUrl) {
    pingTracker(currentTrackers?.clickTracking, 'clickTracking');
    openUrl(currentClickUrl);
  }
};

visitBtn.onclick = (e) => {
  e.stopPropagation();
  if (currentClickUrl) openUrl(currentClickUrl);
};

/* ============================================================
   VAST TRACKING
   ============================================================ */
let currentTrackers = null;

function extractTrackers(xml) {
  const trackers = {
    impression:    [],
    start:         [],
    firstQuartile: [],
    midpoint:      [],
    thirdQuartile: [],
    complete:      [],
    skip:          [],
    mute:          [],
    unmute:        [],
    clickTracking: [],
    error:         [],
  };

  try {
    const doc = new DOMParser().parseFromString(xml, "text/xml");
    doc.querySelectorAll("Impression").forEach(el => {
      const u = el.textContent.trim(); if (u.startsWith("http")) trackers.impression.push(u);
    });
    doc.querySelectorAll("Tracking").forEach(el => {
      const event = el.getAttribute("event");
      const u = el.textContent.trim();
      if (event && trackers[event] && u.startsWith("http")) trackers[event].push(u);
    });
    doc.querySelectorAll("ClickTracking").forEach(el => {
      const u = el.textContent.trim(); if (u.startsWith("http")) trackers.clickTracking.push(u);
    });
    doc.querySelectorAll("Error").forEach(el => {
      const u = el.textContent.trim(); if (u.startsWith("http")) trackers.error.push(u);
    });
  } catch(e) {
    const imp = xml.match(/<Impression[^>]*>(?:<!\[CDATA\[)?(https?:\/\/[^\]<]+)(?:\]\]>)?<\/Impression>/gi);
    if (imp) imp.forEach(m => {
      const u = m.replace(/<[^>]+>/g,'').replace(/<!\[CDATA\[|\]\]>/g,'').trim();
      if (u.startsWith("http")) trackers.impression.push(u);
    });
  }

  const total = Object.values(trackers).reduce((s,a) => s + a.length, 0);
  const vastVer = xml.match(/<VAST[^>]+version="([^"]+)"/)?.[1] || "unknown";
  log(`VAST v${vastVer} | trackers: imp=${trackers.impression.length} events=${trackers.start.length+trackers.complete.length} error=${trackers.error.length} total=${total}`, 'info');
  return trackers;
}

function pingTracker(urls, label) {
  if (!urls || !urls.length) return;
  urls.forEach(url => {
    fetch(url, { method: "GET", mode: "no-cors", keepalive: true }).catch(() => {});
  });
  log(`Tracker ping: ${label} (${urls.length})`, 'info');
}

function setupTrackingEvents(trackers, vid) {
  if (!trackers) return;
  let sentStart = false, sentQ1 = false, sentQ2 = false, sentQ3 = false;

  const onTime = () => {
    const pct = vid.currentTime / (vid.duration || 1);
    if (!sentStart && pct >= 0.01) { sentStart = true; pingTracker(trackers.start, 'start'); }
    if (!sentQ1    && pct >= 0.25) { sentQ1    = true; pingTracker(trackers.firstQuartile, '25%'); }
    if (!sentQ2    && pct >= 0.50) { sentQ2    = true; pingTracker(trackers.midpoint, '50%'); }
    if (!sentQ3    && pct >= 0.75) { sentQ3    = true; pingTracker(trackers.thirdQuartile, '75%'); }
  };

  const onEnded = () => {
    pingTracker(trackers.complete, 'complete');
    vid.removeEventListener("timeupdate", onTime);
    vid.removeEventListener("ended", onEnded);
  };

  vid.addEventListener("timeupdate", onTime);
  vid.addEventListener("ended", onEnded);
}

function extractClickThrough(xml) {
  try {
    const doc = new DOMParser().parseFromString(xml, "text/xml");
    for (const tag of ["ClickThrough", "ClickTracking", "NonLinearClickThrough"]) {
      const el = doc.querySelector(tag);
      if (el) {
        const url = el.textContent.trim();
        if (url.startsWith("http")) { log(`ClickThrough (${tag}): найден`, 'info'); return url; }
      }
    }
  } catch(e) {}
  const m1 = xml.match(/<ClickThrough[^>]*>\s*<!\[CDATA\[\s*(https?:\/\/[^\]]+?)\s*\]\]>/si);
  if (m1) return m1[1].trim();
  const m2 = xml.match(/<ClickThrough[^>]*>\s*(https?:\/\/[^<\s]+)\s*<\/ClickThrough>/si);
  if (m2) return m2[1].trim();
  const m3 = xml.match(/<VideoClicks>[\s\S]*?<ClickThrough[^>]*>[\s\S]*?(https?:\/\/[^\s<"]+)/i);
  if (m3) return m3[1].trim();
  log('ClickThrough: не найден в VAST', 'warn');
  return null;
}

/* ============================================================
   DEVICE ID POOL
   ============================================================ */
function loadPool() {
  try { return JSON.parse(localStorage.getItem("vastPool") || "[]"); } catch(e) { return []; }
}
function savePool(pool) { localStorage.setItem("vastPool", JSON.stringify(pool)); }

/* ============================================================
   CREATIVE FREQUENCY TRACKER
   
   Два уровня отслеживания:
   1. Per-device: сколько раз данный device видел конкретный creative
   2. Global: сколько раз creative показан за скользящий месяц (все device)
   
   Это позволяет не менять device при каждом повторе creative,
   а следить за реальным лимитом частоты (8/мес по KPI Wink).
   
   Структура: { adId: { perDevice: { deviceId: count }, globalCount: N, ts: timestamp } }
   ============================================================ */
const CREATIVE_TTL_MS = 31 * 24 * 60 * 60 * 1000; // 31 день — чуть больше месяца

function loadCreativeFreq() {
  try {
    const raw = JSON.parse(localStorage.getItem("vastCreativeFreq") || "{}");
    const now = Date.now();
    // Чистим устаревшие записи
    Object.keys(raw).forEach(k => { if (now - (raw[k].ts || 0) > CREATIVE_TTL_MS) delete raw[k]; });
    return raw;
  } catch(e) { return {}; }
}
function saveCreativeFreq(freq) {
  try { localStorage.setItem("vastCreativeFreq", JSON.stringify(freq)); } catch(e) {}
}

let creativeFreq = loadCreativeFreq();

// Сколько раз этот creative показан данному device
function getCreativeCountForDevice(adId, deviceId) {
  if (!adId || !deviceId) return 0;
  return creativeFreq[adId]?.perDevice?.[deviceId] || 0;
}

// Сколько раз creative показан глобально за месяц
function getCreativeCountGlobal(adId) {
  if (!adId) return 0;
  return creativeFreq[adId]?.globalCount || 0;
}

// Можно ли показать этот creative данному device?
function canShowCreative(adId, deviceId) {
  if (!adId) return true;
  const perDev = getCreativeCountForDevice(adId, deviceId);
  const global = getCreativeCountGlobal(adId);
  const okPerDevice = perDev < CONFIG.maxCreativeShowsPerDevice;
  const okGlobal    = global < CONFIG.maxCreativeShowsGlobal;
  if (!okPerDevice) log(`Creative ${adId.slice(0,8)}: лимит на device (${perDev}/${CONFIG.maxCreativeShowsPerDevice})`, 'warn');
  if (!okGlobal)    log(`Creative ${adId.slice(0,8)}: глобальный лимит (${global}/${CONFIG.maxCreativeShowsGlobal}) — меняем device`, 'warn');
  return okPerDevice && okGlobal;
}

// Записываем факт показа creative
function recordCreativeShow(adId, deviceId) {
  if (!adId) return;
  if (!creativeFreq[adId]) creativeFreq[adId] = { perDevice: {}, globalCount: 0, ts: Date.now() };
  creativeFreq[adId].perDevice[deviceId] = (creativeFreq[adId].perDevice[deviceId] || 0) + 1;
  creativeFreq[adId].globalCount = (creativeFreq[adId].globalCount || 0) + 1;
  // Ограничиваем размер словаря perDevice (не более 200 device на creative)
  const devKeys = Object.keys(creativeFreq[adId].perDevice);
  if (devKeys.length > 200) delete creativeFreq[adId].perDevice[devKeys[0]];
  // Ограничиваем общий словарь (не более 100 разных creative)
  const allKeys = Object.keys(creativeFreq);
  if (allKeys.length > 100) delete creativeFreq[allKeys[0]];
  saveCreativeFreq(creativeFreq);
  const pd = creativeFreq[adId].perDevice[deviceId];
  const gl = creativeFreq[adId].globalCount;
  log(`Creative ${adId.slice(0,8)}: device=${pd}/${CONFIG.maxCreativeShowsPerDevice}, global=${gl}/${CONFIG.maxCreativeShowsGlobal}`, 'pool');
}

/* ============================================================
   DEVICE CONTEXT
   ============================================================ */
let deviceCtx = null;

async function buildDeviceContext() {
  const RU_TIMEZONES = [
    ["Europe/Moscow",       52],
    ["Europe/Moscow",       10],
    ["Europe/Samara",        5],
    ["Asia/Yekaterinburg",   8],
    ["Asia/Omsk",            3],
    ["Asia/Krasnoyarsk",     4],
    ["Asia/Irkutsk",         3],
    ["Asia/Yakutsk",         2],
    ["Asia/Vladivostok",     3],
    ["Europe/Kaliningrad",   2],
  ];
  function weightedTz() {
    const raw = Intl.DateTimeFormat().resolvedOptions().timeZone;
    if (raw.startsWith("Europe/Moscow") || raw.startsWith("Asia/Yekaterinburg") ||
        raw.startsWith("Asia/Omsk") || raw.startsWith("Asia/Krasnoyarsk") ||
        raw.startsWith("Asia/Irkutsk") || raw.startsWith("Asia/Yakutsk") ||
        raw.startsWith("Asia/Vladivostok") || raw.startsWith("Europe/Kaliningrad") ||
        raw.startsWith("Asia/Magadan") || raw.startsWith("Asia/Sakhalin") ||
        raw.startsWith("Europe/Samara") || raw.startsWith("Asia/Anadyr")) {
      return raw;
    }
    const total = RU_TIMEZONES.reduce((s, [,w]) => s + w, 0);
    let r = Math.random() * total;
    for (const [tz, w] of RU_TIMEZONES) { r -= w; if (r <= 0) return tz; }
    return "Europe/Moscow";
  }
  function normalizeLang() {
    const raw = navigator.language || "";
    if (raw.startsWith("ru")) return raw;
    return "ru-RU";
  }

  const tz    = weightedTz();
  const lang  = normalizeLang();
  const langs = lang.startsWith("ru")
    ? (navigator.languages || [lang]).filter(l => l.startsWith("ru")).join(",") || "ru-RU,ru;q=0.9"
    : "ru-RU,ru;q=0.9,en;q=0.8";
  const sw    = screen.width, sh = screen.height;
  const dpr   = Math.round((window.devicePixelRatio || 1) * 100) / 100;
  const cores = navigator.hardwareConcurrency || 4;
  const mem   = navigator.deviceMemory || 2;
  const ua    = navigator.userAgent;
  const conn  = navigator.connection?.effectiveType || "4g";
  const touch = navigator.maxTouchPoints > 0 ? 1 : 0;

  const isAndroid = /Android/.test(ua);
  const isIOS     = /iPhone|iPad/.test(ua);
  const osName    = isAndroid ? "Android" : isIOS ? "iOS" : "Unknown";
  const osVer     = (ua.match(/Android ([\d.]+)/) || ua.match(/OS ([\d_]+)/) || ["",""])[1].replace(/_/g,".");

  let canvasFp = "0";
  try {
    const c = document.createElement("canvas");
    c.width = 64; c.height = 16;
    const ctx2 = c.getContext("2d");
    ctx2.font = "12px Arial"; ctx2.fillStyle = "#f60";
    ctx2.fillText("CineGram", 2, 12);
    canvasFp = c.toDataURL().slice(-20);
  } catch(e) {}

  return { tz, lang, langs, sw, sh, dpr, cores, mem, conn, touch, osName, osVer, canvasFp };
}

async function generateId() {
  if (!deviceCtx) deviceCtx = await buildDeviceContext();
  try {
    const fp = [
      MOBILE_UA,
      deviceCtx.lang,
      deviceCtx.sw + "x" + deviceCtx.sh,
      screen.colorDepth,
      deviceCtx.cores,
      deviceCtx.mem,
      deviceCtx.tz,
      deviceCtx.canvasFp,
      deviceCtx.dpr,
    ].join("|");

    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(fp));
    const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    const baseHex = hex.slice(0, 16);
    const sessionSalt = Math.random().toString(36).slice(2, 10);
    const id = "fp_" + baseHex + sessionSalt;
    log(`Device fingerprint: ...${id.slice(-8)} | ${deviceCtx.osName} ${deviceCtx.osVer} | ${deviceCtx.sw}x${deviceCtx.sh} | ${deviceCtx.conn}`, 'pool');
    return id;
  } catch(e) {
    let stored = localStorage.getItem("vastDeviceId");
    if (!stored) {
      stored = "rnd_" + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
      localStorage.setItem("vastDeviceId", stored);
    }
    return stored;
  }
}

/* ============================================================
   DEVICE POOL — управление с учётом частоты creative
   
   Ключевое изменение: device НЕ меняется автоматически при
   каждом показе. Смена device происходит только когда:
   1. device исчерпал лимит adsPerDevice (3 показа)
   2. creative достиг лимита PER DEVICE (4 показа этого ролика)
   3. creative достиг глобального лимита (8 показов за месяц)
   
   Это имитирует реальное поведение: один пользователь может
   увидеть один ролик несколько раз подряд — это нормально.
   ============================================================ */

async function getActiveDevice() {
  let pool = loadPool();
  const now = Date.now();
  if (pool.length > CONFIG.poolSize * 2) pool = pool.slice(-CONFIG.poolSize * 2);

  if (forcedDeviceId) {
    let forced = pool.find(d => d.id === forcedDeviceId);
    if (!forced) { forced = { id: forcedDeviceId, plays: 0, cooldownUntil: 0 }; pool.unshift(forced); }
    forcedDeviceId = null;
    savePool(pool);
    log(`Pool: используем принудительный ...${forced.id.slice(-6)}`, 'pool');
    return forced;
  }

  // Выбираем из доступных случайным образом — не всегда первый
  const available = pool.filter(d => d.plays < CONFIG.adsPerDevice && now >= (d.cooldownUntil || 0));
  let device = available.length > 0
    ? available[Math.floor(Math.random() * available.length)]
    : null;

  if (!device) {
    let expired = pool.find(d => now >= (d.cooldownUntil || 0));
    if (expired) {
      log(`Pool: сброс cooldown для ...${expired.id.slice(-6)}`, 'pool');
      expired.plays = 0; expired.cooldownUntil = 0; device = expired;
    } else {
      const baseId = await generateId();
      const newId = pool.length === 0 ? baseId
        : 'fp_' + baseId.slice(3, 7) + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
      device = { id: newId, plays: 0, cooldownUntil: 0 };
      pool.push(device);
      if (pool.length > CONFIG.poolSize * 2) pool.shift();
      log(`Pool: новый ID ...${device.id.slice(-6)} (всего: ${pool.length})`, 'pool');
    }
  }
  savePool(pool);
  return device;
}

let forcedDeviceId = null;

async function forceNextDevice() {
  const pool = loadPool();
  const randSuffix = Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
  const baseId = await generateId();
  const newId = 'fp_' + baseId.slice(3, 7) + randSuffix;
  const newDevice = { id: newId, plays: 0, cooldownUntil: 0 };
  pool.unshift(newDevice);
  if (pool.length > CONFIG.poolSize * 2) pool.pop();
  savePool(pool);
  forcedDeviceId = newId;
  globalPlayIndex = Math.floor(Math.random() * 1000);
  localStorage.setItem("vastGlobalIndex", globalPlayIndex);
  log(`Pool: принудительный новый ID ...${newId.slice(-6)}, новый index=${globalPlayIndex}`, 'pool');
}

function recordPlay(deviceId) {
  const pool = loadPool();
  const device = pool.find(d => d.id === deviceId);
  if (device) {
    device.plays = (device.plays || 0) + 1;
    if (device.plays >= CONFIG.adsPerDevice) {
      device.cooldownUntil = Date.now() + CONFIG.cooldownMs;
      device.plays = 0;
      log(`Pool: ...${deviceId.slice(-6)} → cooldown ${Math.round(CONFIG.cooldownMs/86400000)}д`, 'pool');
    } else {
      log(`Pool: ...${deviceId.slice(-6)} показов: ${device.plays}/${CONFIG.adsPerDevice}`, 'pool');
    }
    savePool(pool);
  }
}

/* ============================================================
   УТИЛИТЫ
   ============================================================ */
function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) { hash = (hash << 5) - hash + str.charCodeAt(i); hash |= 0; }
  return Math.abs(hash);
}
function showLoader(show) { show ? loader.classList.remove("hidden") : loader.classList.add("hidden"); }
function bumpGlobalIndex() { globalPlayIndex++; localStorage.setItem("vastGlobalIndex", globalPlayIndex); }

// Пауза с человеческой вариацией — важно для anti-fraud
function humanDelay(minMs, maxMs) {
  const ms = minMs + Math.floor(Math.random() * (maxMs - minMs));
  return new Promise(resolve => setTimeout(resolve, ms));
}

/* ============================================================
   VAST
   ============================================================ */
async function buildVastUrl(deviceId, playIndex) {
  const groupSize   = 3;
  const deviceGroup = hashCode(deviceId) % groupSize;
  const ctx   = deviceCtx || {};
  const conn  = navigator.connection?.effectiveType || ctx.conn || "4g";
  const humanCb = Date.now() - Math.floor(Math.random() * 3500 + 500);

  let batteryLevel = null;
  try {
    const bat = await navigator.getBattery?.();
    if (bat) batteryLevel = Math.round(bat.level * 100);
  } catch(e) {}

  const params = new URLSearchParams({
    ad_place_type:    "preroll",
    age_value:        "18",
    broadcast_type:   "ott",
    client_id:        deviceId,
    client_version:   "",
    domain:           "t.me",
    embedded:         "P5",
    is_child:         "false",
    is_paid:          "0",
    location:         "100001",
    san:              "web_vast_code",
    ad_position:      "1",
    content_id:       "23080",
    device_type:      "NCWEB",
    web_client_type:  "mobile",
    cb:               humanCb,
  });

  return `https://ssp.wink.ru/v1/rt/avod/vast?${params.toString()}`;
}

const MOBILE_UA = navigator.userAgent;

async function fetchWithTimeout(url, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, {
      signal: controller.signal,
      headers: {
        "Accept": "application/xml, text/xml, */*;q=0.9",
        "Accept-Language": "ru-RU,ru;q=0.9",
      }
    });
    clearTimeout(timer);
    return await res.text();
  } catch(e) { clearTimeout(timer); throw e; }
}

async function resolveVast(url, depth = 0, parentXml = '') {
  if (depth > 5) throw new Error("VAST wrapper depth exceeded");
  log(`VAST fetch [depth=${depth}]: ${url.slice(0,120)}...`, 'vast');
  log(`VAST URL params: ${url.slice(url.indexOf('?')+1, url.indexOf('?')+200)}`, 'info');
  let xml = '';
  try {
    xml = await fetchWithTimeout(url, CONFIG.fetchTimeoutMs);
  } catch(fetchErr) {
    log(`VAST fetch error: ${fetchErr.message} | URL начало: ${url.slice(0,80)}`, 'error');
    throw fetchErr;
  }
  log(`VAST ответ: ${xml.length}б | ${xml.slice(0,200).replace(/\s+/g,' ')}`, 'vast');

  const hasAd = xml.includes('<Ad ') || xml.includes('<Ad>');
  if (!hasAd && xml.includes('<VAST')) {
    log(`VAST No-Fill — SSP не дал рекламу. XML: ${xml.slice(0,150).replace(/\s+/g,' ')}`, 'warn');
    return xml;
  }
  if (!xml.includes('<VAST') && xml.length < 200) {
    log(`VAST невалидный (${xml.length}б): ${xml.slice(0,100)}`, 'warn');
  }

  const wrapper = xml.match(/<VASTAdTagURI><!\[CDATA\[([\s\S]*?)\]\]>/);
  if (wrapper) {
    log(`VAST wrapper → цепочка`, 'vast');
    return resolveVast(wrapper[1].trim(), depth + 1, parentXml + xml);
  }
  const merged = xml + parentXml;
  const hasMedia = merged.includes('MediaFile') || merged.includes('.mp4');
  log(`VAST разобран. MediaFile: ${hasMedia ? 'найден ✓' : 'НЕ найден ✗'}`, hasMedia ? 'vast' : 'warn');
  return merged;
}

function extractMedia(xml) {
  try {
    const doc    = new DOMParser().parseFromString(xml, "text/xml");
    const mediaFiles = Array.from(doc.querySelectorAll("MediaFile"));
    for (const m of mediaFiles) {
      const api  = (m.getAttribute("apiFramework") || "").toUpperCase();
      const type = (m.getAttribute("type") || "").toLowerCase();
      const url  = m.textContent.trim();
      if (api === "VPAID") { log(`Пропуск VPAID: ${url.slice(0,50)}`, 'warn'); statsVpaid++; continue; }
      if (url.match(/\.(js|swf)(\?|$)/i)) { log(`Пропуск non-video: ${url.slice(0,50)}`, 'warn'); continue; }
      if (url.match(/\.(mp4|webm|m3u8)(\?|$)/i) || type.includes("mp4") || type.includes("webm")) {
        log(`Media URL: ${url.slice(0,70)}...`, 'ok');
        return url;
      }
    }
    for (const m of mediaFiles) {
      const api = (m.getAttribute("apiFramework") || "").toUpperCase();
      const url = m.textContent.trim();
      if (api === "VPAID" || url.match(/\.(js|swf)(\?|$)/i)) continue;
      if (url.startsWith("http")) { log(`Media URL (fallback): ${url.slice(0,70)}...`, 'ok'); return url; }
    }
  } catch(e) { log(`Ошибка парсинга XML: ${e.message}`, 'warn'); }
  const match = xml.match(/https?:\/\/[^\s"<>]+\.mp4[^\s"<>]*/i);
  if (match) { log(`Media URL (regex mp4): ${match[0].slice(0,70)}...`, 'ok'); return match[0]; }
  return null;
}

function getAdId(xml) {
  try {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const inlineAd = doc.querySelector('Ad > InLine');
    if (inlineAd) return inlineAd.closest('Ad')?.getAttribute('id') || null;
  } catch(e) {}
  return null;
}

/* ============================================================
   SKIP + АВТОПРОПУСК
   
   Выбираем поведение ДО старта ролика:
   - full-view (55% из сегмента): ждём события ended — пропуска нет
   - full-view (45% из сегмента): показываем кнопку после skipDelaySec,
     нажимаем автоматически когда progress ≥ выбранного порога (80–100%)
   - mid-skip / early-skip: показываем кнопку после skipDelaySec,
     нажимаем автоматически на выбранном проценте просмотра
   
   Кнопка ВСЕГДА становится доступна через skipDelaySec (12с) —
   автонажатие ждёт нужного прогресса независимо от этого.
   ============================================================ */
let skipTimer     = null;
let autoSkipTimer = null;
let currentSkipBehavior = null; // { segment, targetPct, willAutoSkip }

function resetSkip() {
  skipBtn.style.display = "none";
  if (skipTimer)     clearTimeout(skipTimer);
  if (autoSkipTimer) clearTimeout(autoSkipTimer);
  skipTimer     = null;
  autoSkipTimer = null;
  currentSkipBehavior = null;
  video.removeEventListener("timeupdate", _autoSkipCheck);
}

// Взвешенный случайный выбор сегмента
function pickSkipBehavior() {
  const segments = CONFIG.autoSkip.segments;
  let r = Math.random();
  for (const seg of segments) { r -= seg.prob; if (r <= 0) return seg; }
  return segments[0];
}

// Слушатель прогресса для автоматического пропуска
function _autoSkipCheck() {
  if (!currentSkipBehavior?.willAutoSkip) return;
  const dur = video.duration;
  if (!dur || dur === Infinity) return;
  const pct = video.currentTime / dur;
  if (pct >= currentSkipBehavior.targetPct) {
    video.removeEventListener("timeupdate", _autoSkipCheck);
    log(`AutoSkip: ${Math.round(pct * 100)}% (цель ${Math.round(currentSkipBehavior.targetPct * 100)}%, сегмент: ${currentSkipBehavior.label})`, 'info');
    // Небольшая случайная задержка перед нажатием — имитирует время реакции человека (200–900мс)
    const reactionMs = 200 + Math.floor(Math.random() * 700);
    autoSkipTimer = setTimeout(() => {
      pingTracker(currentTrackers?.skip, 'skip');
      resetSkip();
      setClickUrl(null);
      startAd();
    }, reactionMs);
  }
}

function startSkipCountdown() {
  resetSkip();

  // Выбираем поведение для этого ролика
  const seg = pickSkipBehavior();

  // Для full-view: решаем досмотрит или нажмёт skip после 80%
  const isFullWatch = seg.label === "full-view" && Math.random() < CONFIG.autoSkip.fullViewWatchRatio;

  if (isFullWatch) {
    // Досматривает до конца — кнопку показываем, но не нажимаем автоматически
    currentSkipBehavior = { segment: seg, targetPct: 1.0, willAutoSkip: false, label: seg.label };
    skipTimer = setTimeout(() => {
      skipBtn.style.display = "flex";
      log('Кнопка пропуска показана (досматривает)', 'debug');
    }, CONFIG.skipDelaySec * 1000);
    return;
  }

  // Выбираем точный момент пропуска внутри диапазона сегмента
  // Добавляем небольшое смещение к нижней границе для реализма
  const range   = seg.maxPct - seg.minPct;
  // Используем бета-подобное распределение внутри диапазона:
  // берём минимум двух случайных — смещает распределение ближе к началу диапазона
  // (люди чаще пропускают сразу как появилась возможность, а не ждут максимума)
  const r1 = Math.random(), r2 = Math.random();
  const rawPct  = seg.label === "full-view"
    ? seg.minPct + range * Math.max(r1, r2)   // full-view: ближе к концу
    : seg.minPct + range * Math.min(r1, r2);  // skip: ближе к началу диапазона
  const targetPct = Math.round(rawPct * 100) / 100; // округляем до 1%

  currentSkipBehavior = { segment: seg, targetPct, willAutoSkip: true, label: seg.label };
  log(`AutoSkip запланирован: ${Math.round(targetPct * 100)}% (сегмент: ${seg.label})`, 'debug');

  // Показываем кнопку через skipDelaySec — независимо от autoSkip
  skipTimer = setTimeout(() => {
    skipBtn.style.display = "flex";
    log('Кнопка пропуска показана', 'debug');
  }, CONFIG.skipDelaySec * 1000);

  // Слушаем прогресс — ждём нужного момента
  video.addEventListener("timeupdate", _autoSkipCheck);
}

/* ============================================================
   PRELOAD — предзагружаем следующий VAST пока играет текущий.
   
   ВАЖНО: preloadNext НЕ вызывает forceNextDevice() автоматически.
   Он использует текущий активный device или создаёт новый только
   если текущий device близок к исчерпанию лимита.
   Это убирает двойной deviceId churn из оригинального кода.
   ============================================================ */
let preloadCache = null;

async function preloadNext(currentDeviceId) {
  try {
    // Проверяем — нужен ли новый device для preload?
    // Если текущий device ещё не исчерпал лимит, используем его же
    const pool = loadPool();
    const currentDevice = pool.find(d => d.id === currentDeviceId);
    const needNewDevice = !currentDevice || currentDevice.plays >= CONFIG.adsPerDevice - 1;

    if (needNewDevice) {
      await forceNextDevice();
      log(`Preload: device близок к лимиту — создаём новый`, 'pool');
    } else {
      // Используем тот же device — он может увидеть следующий ролик
      forcedDeviceId = currentDeviceId;
      log(`Preload: используем тот же device ...${currentDeviceId.slice(-6)}`, 'pool');
    }

    const device  = await getActiveDevice();
    const nextIdx = globalPlayIndex + 1;
    const vastUrl = await buildVastUrl(device.id, nextIdx);
    const xml     = await resolveVast(vastUrl);
    const mediaUrl = extractMedia(xml);
    const clickUrl = extractClickThrough(xml);
    const trackers = extractTrackers(xml);
    const adId = getAdId(xml);

    if (mediaUrl) {
      preloadCache = { mediaUrl, clickUrl, trackers, deviceId: device.id, adId, xml };
      log(`Preload: ролик готов [device=...${device.id.slice(-6)}, creative=${adId?.slice(0,8) || 'unknown'}]`, 'info');
    } else {
      preloadCache = null;
      log(`Preload: нет медиа — кэш сброшен`, 'warn');
    }
  } catch(e) {
    preloadCache = null;
    log(`Preload ошибка: ${e.message}`, 'warn');
  }
}

/* ============================================================
   ОСНОВНОЙ ЦИКЛ
   
   Логика принятия решений о смене device:
   
   A) creative из preloadCache → проверяем canShowCreative(adId, deviceId)
      - можно показывать: используем как есть
      - нельзя (лимит): сбрасываем preloadCache и делаем новый запрос
                        с ТЕКУЩИМ (не новым) device — он ещё может видеть другой creative
   
   B) свежий VAST → проверяем canShowCreative(adId, device.id)
      - можно: показываем
      - нельзя (per-device лимит): пробуем снова на том же device (может дать другой creative)
      - нельзя (global лимит): меняем device т.к. это ограничение не зависит от device
   
   Смена device происходит только при глобальном лимите creative
   или исчерпании adsPerDevice — не при каждом показе.
   ============================================================ */
let currentSession = 0;

async function startAd() {
  const mySession  = ++currentSession;
  currentSessionId = mySession;

  log(`=== Сессия #${mySession} | globalIndex=${globalPlayIndex} ===`, 'info');

  resetSkip();
  setClickUrl(null);
  showLoader(true);
  video.pause();
  video.removeAttribute("src");
  video.load();

  // Межсессионная пауза — имитирует естественное поведение пользователя
  // Реальный юзер не переключает контент моментально
  await humanDelay(CONFIG.minInterSessionMs, CONFIG.maxInterSessionMs);
  if (mySession !== currentSession) return;

  const device    = await getActiveDevice();
  currentDeviceId = device.id;
  log(`Device: ...${device.id.slice(-6)}, plays=${device.plays}`, 'info');

  statsAttempts++;

  for (let attempt = 1; attempt <= CONFIG.maxRetries; attempt++) {
    if (mySession !== currentSession) { log(`Сессия #${mySession} отменена`, 'debug'); return; }

    log(`Попытка ${attempt}/${CONFIG.maxRetries}`, 'info');

    try {
      let mediaUrl, clickUrl, adId, useDeviceId;

      if (preloadCache) {
        const cached = preloadCache;
        preloadCache = null;

        if (cached.adId && !canShowCreative(cached.adId, cached.deviceId)) {
          // Preload-кэш не подходит — creative на лимите.
          // НЕ создаём новый device — просто запрашиваем заново с текущим
          log(`Preload: creative ${cached.adId.slice(0,8)} на лимите — запрашиваем заново`, 'warn');
          // Падаем на обычный VAST запрос ниже (preloadCache уже null)
        } else {
          // Preload подходит — используем его device
          mediaUrl = cached.mediaUrl;
          clickUrl = cached.clickUrl;
          currentTrackers = cached.trackers;
          adId = cached.adId;
          useDeviceId = cached.deviceId;
          // Устанавливаем device из кэша как активный
          forcedDeviceId = cached.deviceId;
          const cachedDev = await getActiveDevice();
          currentDeviceId = cachedDev.id;
          log(`Используем preload-кэш [device=...${useDeviceId?.slice(-6)}, creative=${adId?.slice(0,8)||'?'}]`, 'info');
        }
      }

      if (!mediaUrl) {
        // Обычный VAST запрос
        const vastUrl = await buildVastUrl(device.id, globalPlayIndex);
        const xml     = await resolveVast(vastUrl);
        if (mySession !== currentSession) return;

        mediaUrl = extractMedia(xml);
        adId     = getAdId(xml);
        useDeviceId = device.id;

        if (adId && !canShowCreative(adId, device.id)) {
          // Creative на лимите для этого device
          const globalExceeded = getCreativeCountGlobal(adId) >= CONFIG.maxCreativeShowsGlobal;
          if (globalExceeded) {
            // Глобальный лимит — меняем device
            log(`Creative ${adId.slice(0,8)}: глобальный лимит → новый device`, 'warn');
            await forceNextDevice();
            bumpGlobalIndex();
            startAd(); return;
          } else {
            // Per-device лимит — НЕ меняем device, просто пробуем ещё раз
            // SSP может выдать другой creative на следующей попытке
            log(`Creative ${adId.slice(0,8)}: лимит на device → повтор запроса (device тот же)`, 'warn');
            globalPlayIndex = (globalPlayIndex + Math.floor(Math.random() * 7 + 1)) % 10000;
            localStorage.setItem('vastGlobalIndex', globalPlayIndex);
            await humanDelay(CONFIG.noAdRetryMs, CONFIG.noAdRetryMs * 2);
            continue;
          }
        }

        clickUrl = extractClickThrough(xml);
        currentTrackers = extractTrackers(xml);
      }

      if (!mediaUrl) {
        globalPlayIndex = (globalPlayIndex + Math.floor(Math.random() * 7 + 1)) % 10000;
        localStorage.setItem('vastGlobalIndex', globalPlayIndex);
        log(`Попытка ${attempt}: нет медиа → новый index=${globalPlayIndex}, пауза`, 'warn');
        await humanDelay(CONFIG.noAdRetryMs, CONFIG.noAdRetryMs * 2);
        continue;
      }

      log(`Загрузка видео...`, 'info');
      adStartTime = Date.now();
      video.src   = mediaUrl;
      video.muted = isMuted;
      video.load();

      await new Promise((resolve, reject) => {
        const onReady = () => { cleanup(); log('canplay ✓', 'ok'); resolve(); };
        const onError = () => { cleanup(); reject(new Error(`video error code=${video.error?.code}`)); };
        const onAbort = () => { cleanup(); reject(new Error("video aborted")); };
        const timer   = setTimeout(() => { cleanup(); reject(new Error("video load timeout 10s")); }, 10000);
        const cleanup = () => {
          clearTimeout(timer);
          video.removeEventListener("canplay", onReady);
          video.removeEventListener("error",   onError);
          video.removeEventListener("abort",   onAbort);
        };
        video.addEventListener("canplay", onReady);
        video.addEventListener("error",   onError);
        video.addEventListener("abort",   onAbort);
      });

      if (mySession !== currentSession) return;

      positionControls();
      showLoader(false);
      setClickUrl(clickUrl);

      try {
        await video.play();
        log('play() ✓', 'ok');
      } catch(playErr) {
        log(`play() заблокирован → muted`, 'warn');
        video.muted = true; isMuted = true;
        muteBtn.textContent = '🔇';
        muteBtn.classList.add('muted');
        await video.play();
        log('play() muted ✓', 'ok');
      }

      startSkipCountdown();

      // Записываем показы ПОСЛЕ успешного запуска
      const finalDeviceId = useDeviceId || device.id;
      recordPlay(finalDeviceId);
      bumpGlobalIndex();
      statsSuccess++;

      if (adId) {
        recordCreativeShow(adId, finalDeviceId);
      }

      // Запускаем трекинг
      pingTracker(currentTrackers?.impression, 'impression');
      setupTrackingEvents(currentTrackers, video);
      log(`Ролик запущен ✓ globalIndex → ${globalPlayIndex}`, 'ok');

      if (statsSuccess % 5 === 0) logStats();

      // Предзагружаем следующий через 2 секунды,
      // передаём текущий deviceId чтобы preload мог решить менять ли device
      setTimeout(() => preloadNext(finalDeviceId), 2000);
      return;

    } catch(e) {
      if (mySession !== currentSession) return;
      let msg = e.message || "unknown error";
      if (e.name === "AbortError") msg = "таймаут запроса";
      else if (msg === "Load failed") msg = "Load failed (iOS WebKit CORS/сеть)";
      else if (msg === "Failed to fetch") msg = "Failed to fetch (CORS/сеть)";
      log(`ОШИБКА попытки ${attempt}: ${msg}`, 'error');
      await humanDelay(CONFIG.retryDelayMs * attempt, CONFIG.retryDelayMs * attempt * 2);
    }
  }

  if (mySession !== currentSession) return;
  statsFail++;
  log(`Все попытки провалились → смена device + пауза`, 'error');
  pingTracker(currentTrackers?.error?.map(u => u.replace("[ERRORCODE]", "900")), 'error:900');
  logStats();
  await forceNextDevice();
  showLoader(false);
  await humanDelay(3000, 5000);
  startAd();
}

function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

/* ============================================================
   СОБЫТИЯ ВИДЕО
   ============================================================ */
video.addEventListener("ended", () => {
  log('Видео завершено', 'ok');
  video.removeEventListener("timeupdate", _autoSkipCheck);
  resetSkip(); setClickUrl(null);
  startAd();
});
video.addEventListener("error", () => {
  if (!video.src || video.src === window.location.href) return;
  log(`video.error: code=${video.error?.code}`, 'warn');
});
video.addEventListener("waiting", () => log('Буферизация...', 'debug'));
video.addEventListener("stalled", () => log('Зависание потока (stalled)', 'warn'));
let adStartTime = 0;
video.addEventListener("playing", () => {
  const ttff = adStartTime ? Math.round(Date.now() - adStartTime) : 0;
  log(`Воспроизведение (playing) | TTFF: ${ttff}мс`, ttff > 3000 ? 'warn' : 'ok');
});

skipBtn.onclick = () => {
  log('Skip (ручной)', 'info');
  pingTracker(currentTrackers?.skip, 'skip');
  pingTracker(currentTrackers?.clickTracking, 'clickTracking');
  resetSkip(); setClickUrl(null); startAd();
};

closeBtn.onclick = () => {
  log('Закрытие плеера', 'info');
  video.pause();
  if (window.Telegram?.WebApp) window.Telegram.WebApp.close();
  else window.location.href = "index.html";
};

/* ============================================================
   СТАРТ
   ============================================================ */
log('Плеер запущен', 'ok');

(async () => {
  const tgApp = window.Telegram?.WebApp;
  let locked = false;

  try {
    await screen.orientation.lock("landscape");
    log('Ориентация: landscape locked ✓', 'ok');
    locked = true;
  } catch(e) {}

  if (!locked) {
    try {
      tgApp?.lockOrientation?.();
      await new Promise(r => setTimeout(r, 500));
      const isLandscape = window.innerWidth > window.innerHeight;
      log('Ориентация: tg.lockOrientation → ' + (isLandscape ? 'landscape ✓' : 'portrait (iOS игнорирует)'), isLandscape ? 'ok' : 'warn');
      locked = isLandscape;
    } catch(e) {}
  }

  if (!locked && window.innerWidth <= window.innerHeight) {
    log('Ориентация: iOS блокирует autorotate — показываем подсказку', 'warn');
    const hint = document.createElement('div');
    hint.id = 'rotateHint';
    hint.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-size:18px;text-align:center;padding:24px;';
    hint.innerHTML = '<div style="font-size:52px;margin-bottom:16px">&#128241;&#10145;&#65039;</div><div style="font-weight:600;margin-bottom:8px">Поверните устройство</div><div style="opacity:.7;font-size:15px">для просмотра контента</div>';
    document.body.appendChild(hint);
    const onOrient = () => {
      if (window.innerWidth > window.innerHeight) { hint.remove(); window.removeEventListener('resize', onOrient); }
    };
    window.addEventListener('resize', onOrient);
  }
})();

buildDeviceContext().then(ctx => {
  deviceCtx = ctx;
  log(`OS: ${ctx.osName} ${ctx.osVer} | ${ctx.sw}x${ctx.sh} | net: ${ctx.conn}`, 'info');
});
log(`Config: adsPerDevice=${CONFIG.adsPerDevice}, cooldown=${CONFIG.cooldownMs/86400000}д, creative перDevice=${CONFIG.maxCreativeShowsPerDevice}, creativeGlobal=${CONFIG.maxCreativeShowsGlobal}`, 'debug');
log(`Sheets: ${CONFIG.sheetsEnabled ? 'включён ✓' : 'выключен'}`, 'info');
log(`UA: ${MOBILE_UA.slice(0, 60)}...`, 'info');

const pw = window.innerWidth, ph = window.innerHeight;
const isMobileFullscreen = Math.min(pw, ph) >= 360;
const sizeOk = (pw >= CONFIG.minPlayerW && ph >= CONFIG.minPlayerH) || isMobileFullscreen;
log(`Размер плеера: ${pw}×${ph} px — ${sizeOk ? '✓ OK' : '✗ НИЖЕ KPI'}`, sizeOk ? 'ok' : 'warn');

const observer = new IntersectionObserver(entries => {
  const ratio = entries[0]?.intersectionRatio ?? 1;
  const rotateActive = !!document.getElementById('rotateHint');
  if (ratio < 0.5 && !rotateActive) log(`Viewability: плеер вышел из зоны видимости (${Math.round(ratio*100)}%)`, 'warn');
}, { threshold: [0, 0.5, 1.0] });
observer.observe(document.getElementById("playerWrapper"));
log(`globalPlayIndex: ${globalPlayIndex}`, 'debug');

window.addEventListener("pagehide", () => {
  try { screen.orientation.unlock(); } catch(e) {}
  try { window.Telegram?.WebApp?.unlockOrientation?.(); } catch(e) {}
});

startAd();

</script>
</body>
