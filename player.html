<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VAST Player</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#playerWrapper {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: #000;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: #000;
}

#clickOverlay {
  position: absolute;
  z-index: 10;
  cursor: default;
}

#videoControls {
  position: absolute;
  z-index: 20;
  pointer-events: none;
}

.ctrl-btn {
  position: absolute;
  pointer-events: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.9);
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.2); }

#closeBtn {
  top: 28px; right: 12px;
  width: 30px; height: 30px;
  font-size: 14px;
}

#muteBtn {
  bottom: 12px; left: 12px;
  width: 36px; height: 36px;
  font-size: 17px;
}
#muteBtn.muted { border-color: rgba(255,100,100,0.7); }

#skipBtn {
  bottom: 12px; right: 12px;
  width: auto; height: 34px;
  border-radius: 8px;
  padding: 0 14px;
  font-size: 13px;
  display: none;
}

#visitBtn {
  bottom: 54px; right: 12px;
  width: auto; height: 34px;
  border-radius: 8px;
  padding: 0 14px;
  font-size: 13px;
  display: none;
}

#logPanel {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 2000;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
#logPanel.open { transform: translateY(0); }

#logHeader {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}
#logTitle { color: rgba(255,255,255,0.9); font-size: 14px; font-weight: bold; }
#logControls { display: flex; gap: 10px; align-items: center; }
#logDownload {
  color: rgba(100,210,140,0.8); font-size: 12px; cursor: pointer;
  padding: 3px 10px; border: 1px solid rgba(100,210,140,0.3); border-radius: 10px;
}
#logClear {
  color: rgba(255,100,100,0.8); font-size: 12px; cursor: pointer;
  padding: 3px 10px; border: 1px solid rgba(255,100,100,0.3); border-radius: 10px;
}
#logClose { color: rgba(255,255,255,0.6); font-size: 22px; cursor: pointer; line-height: 1; }

#logBody {
  flex: 1; overflow-y: auto; padding: 4px 0;
  font-family: 'Courier New', monospace; font-size: 11px;
}
.log-entry {
  display: flex; gap: 8px; padding: 5px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  word-break: break-all; line-height: 1.5;
}
.log-entry:last-child { border-bottom: none; }
.log-time { color: rgba(255,255,255,0.28); flex-shrink: 0; font-size: 10px; padding-top: 2px; min-width: 60px; }
.log-msg  { flex: 1; }
.log-info  { color: rgba(160,210,255,0.9); }
.log-ok    { color: rgba(100,220,130,0.9); }
.log-warn  { color: rgba(255,210,80,0.9); }
.log-error { color: rgba(255,100,100,0.95); font-weight: bold; }
.log-debug { color: rgba(170,170,170,0.6); }
.log-vast  { color: rgba(190,150,255,0.9); }
.log-pool  { color: rgba(255,180,80,0.85); }

#loader {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #000; z-index: 500; transition: opacity 0.4s;
}
#loader.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: rgba(255,255,255,0.7);
  border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader p { color: rgba(255,255,255,0.5); font-size: 13px; }

</style>
</head>
<body>

<div id="playerWrapper">

  <div id="loader">
    <div class="spinner"></div>
    <p>Загрузка рекламы...</p>
  </div>

  <video id="video" playsinline></video>

  <div id="clickOverlay"></div>

  <div id="videoControls">
    <div id="closeBtn" class="ctrl-btn">✕</div>
    <div id="muteBtn" class="ctrl-btn">🔊</div>
    <div id="skipBtn" class="ctrl-btn">Пропустить →</div>
    <div id="visitBtn" class="ctrl-btn">Перейти</div>
  </div>

  <div id="logPanel">
    <div id="logHeader">
      <div id="logTitle">📋 Лог событий</div>
      <div id="logControls">
        <div id="logDownload">скачать</div>
        <div id="logClear">очистить</div>
        <div id="logClose">✕</div>
      </div>
    </div>
    <div id="logBody"></div>
  </div>

</div>

<script>

const CONFIG = {
  adsPerDevice:   3,
  poolSize:       50,
  cooldownMs:     30 * 60 * 1000,
  skipDelaySec:   5,
  fetchTimeoutMs: 8000,
  maxRetries:     3,
  retryDelayMs:   1500,
  noAdRetryMs:    2000,
  sheetsUrl:      "https://script.google.com/macros/s/AKfycbwmRLicIgCvj6RSYLqbFuxqkcNHqvDvPgTpeFQw-60X_O9-wVy9z5TWZo5iIEfQp4GAVQ/exec",
  sheetsEnabled:  true,
  sheetsTypes:    ["info", "ok", "warn", "error", "pool"],
};

const video        = document.getElementById("video");
const clickOverlay = document.getElementById("clickOverlay");
const closeBtn     = document.getElementById("closeBtn");
const muteBtn      = document.getElementById("muteBtn");
const skipBtn      = document.getElementById("skipBtn");
const visitBtn     = document.getElementById("visitBtn");
const loader       = document.getElementById("loader");
const logPanel     = document.getElementById("logPanel");
const logBody      = document.getElementById("logBody");
const logClear     = document.getElementById("logClear");
const logClose     = document.getElementById("logClose");
const logDownload  = document.getElementById("logDownload");
const controls     = document.getElementById("videoControls");

/* ПОЗИЦИОНИРОВАНИЕ КНОПОК ПОВЕРХ РЕАЛЬНОГО ВИДЕО */
function getVideoRect() {
  const vw = video.videoWidth  || video.clientWidth;
  const vh = video.videoHeight || video.clientHeight;
  const cw = video.clientWidth;
  const ch = video.clientHeight;
  if (!vw || !vh) return { x: 0, y: 0, w: cw, h: ch };
  const scale = Math.min(cw / vw, ch / vh);
  const w = vw * scale;
  const h = vh * scale;
  const x = (cw - w) / 2;
  const y = (ch - h) / 2;
  return { x, y, w, h };
}

function positionControls() {
  const { x, y, w, h } = getVideoRect();
  clickOverlay.style.left   = x + 'px';
  clickOverlay.style.top    = y + 'px';
  clickOverlay.style.width  = w + 'px';
  clickOverlay.style.height = h + 'px';
  controls.style.left   = x + 'px';
  controls.style.top    = y + 'px';
  controls.style.width  = w + 'px';
  controls.style.height = h + 'px';
}

window.addEventListener('resize', positionControls);
video.addEventListener('loadedmetadata', positionControls);
video.addEventListener('resize', positionControls);
requestAnimationFrame(positionControls);

/* GOOGLE SHEETS */
let sheetsQueue   = [];
let sheetsSending = false;

async function sheetsSend(entry) {
  if (!CONFIG.sheetsEnabled) return;
  if (!CONFIG.sheetsTypes.includes(entry.type)) return;
  sheetsQueue.push(entry);
  if (!sheetsSending) sheetsFlush();
}

async function sheetsFlush() {
  if (sheetsQueue.length === 0) { sheetsSending = false; return; }
  sheetsSending = true;
  const entry = sheetsQueue[0];
  try {
    await fetch(CONFIG.sheetsUrl, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(entry)
    });
    sheetsQueue.shift();
  } catch(e) {
    sheetsQueue.shift();
  }
  setTimeout(sheetsFlush, 300);
}

/* ЛОГГЕР */
let allLogs          = [];
let currentSessionId = 0;
let currentDeviceId  = "";
let globalPlayIndex  = parseInt(localStorage.getItem("vastGlobalIndex") || "0");

function ts() {
  const d = new Date();
  return d.toTimeString().slice(0,8) + '.' + String(d.getMilliseconds()).padStart(3,'0');
}

function log(msg, type = 'info') {
  const time = ts();
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${time}</span><span class="log-msg log-${type}">${msg}</span>`;
  logBody.appendChild(entry);
  logBody.scrollTop = logBody.scrollHeight;
  const record = { time, type, msg, session: currentSessionId, device: currentDeviceId ? '...'+currentDeviceId.slice(-6) : '', index: globalPlayIndex };
  allLogs.push(record);
  sheetsSend(record);
  while (logBody.children.length > 300) logBody.removeChild(logBody.firstChild);
}

const _origError = console.error;
console.error = (...args) => { log('CONSOLE: ' + args.join(' '), 'error'); _origError.apply(console, args); };
window.addEventListener('error', e => log(`JS ERROR: ${e.message} (${e.lineno})`, 'error'));
window.addEventListener('unhandledrejection', e => log(`UNHANDLED: ${e.reason}`, 'error'));

/* ПАНЕЛЬ ЛОГОВ */
logClose.onclick = () => { logPanel.classList.remove('open'); };
logClear.onclick = () => {
  logBody.innerHTML = ''; allLogs = [];
  log('Лог очищен', 'debug');
};
logDownload.onclick = () => {
  const lines = allLogs.map(r =>
    `[${r.time}] [${r.type.toUpperCase().padEnd(5)}] [s#${r.session}] [${r.device}] [i=${r.index}] ${r.msg}`
  ).join('\n');
  const blob = new Blob([lines], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `vast-log-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  log('Лог скачан', 'ok');
};

/* ЗВУК */
let isMuted = false;

muteBtn.onclick = () => {
  isMuted = !isMuted;
  video.muted = isMuted;
  muteBtn.textContent = isMuted ? '🔇' : '🔊';
  muteBtn.classList.toggle('muted', isMuted);
  log(`Звук: ${isMuted ? 'выключен' : 'включён'}`, 'info');
};

/* CLICK THROUGH */
let currentClickUrl = null;

function openUrl(url) {
  log(`Переход по ссылке: ${url}`, 'ok');
  if (window.Telegram?.WebApp?.openLink) {
    // try_instant_view принудительно открывает внутренний браузер Telegram
    window.Telegram.WebApp.openLink(url, { try_instant_view: true });
  } else {
    window.open(url, '_blank');
  }
}

function setClickUrl(url) {
  currentClickUrl = url;
  if (url) {
    visitBtn.style.display = 'flex';
    clickOverlay.style.cursor = 'pointer';
    log(`ClickThrough URL установлен`, 'info');
  } else {
    visitBtn.style.display = 'none';
    clickOverlay.style.cursor = 'default';
  }
}

clickOverlay.onclick = () => {
  if (currentClickUrl) openUrl(currentClickUrl);
};

visitBtn.onclick = (e) => {
  e.stopPropagation();
  if (currentClickUrl) openUrl(currentClickUrl);
};

function extractClickThrough(xml) {
  try {
    const doc = new DOMParser().parseFromString(xml, "text/xml");
    const el  = doc.querySelector("ClickThrough");
    if (el) return el.textContent.trim();
  } catch(e) {}
  const match = xml.match(/<ClickThrough[^>]*><!\[CDATA\[(.*?)\]\]>/s)
             || xml.match(/<ClickThrough[^>]*>(https?:\/\/[^<]+)<\/ClickThrough>/);
  return match ? match[1].trim() : null;
}

/* DEVICE ID POOL */
function loadPool() {
  try { return JSON.parse(localStorage.getItem("vastPool") || "[]"); } catch(e) { return []; }
}
function savePool(pool) { localStorage.setItem("vastPool", JSON.stringify(pool)); }
function generateId() { return "dev_" + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2); }

function getActiveDevice() {
  let pool = loadPool();
  const now = Date.now();
  if (pool.length > CONFIG.poolSize * 2) pool = pool.slice(-CONFIG.poolSize * 2);
  let device = pool.find(d => d.plays < CONFIG.adsPerDevice && now >= (d.cooldownUntil || 0));
  if (!device) {
    let expired = pool.find(d => now >= (d.cooldownUntil || 0));
    if (expired) {
      log(`Pool: сброс cooldown для ...${expired.id.slice(-6)}`, 'pool');
      expired.plays = 0; expired.cooldownUntil = 0; device = expired;
    } else {
      device = { id: generateId(), plays: 0, cooldownUntil: 0 };
      pool.push(device);
      if (pool.length > CONFIG.poolSize * 2) pool.shift();
      log(`Pool: новый ID ...${device.id.slice(-6)} (всего: ${pool.length})`, 'pool');
    }
  }
  savePool(pool);
  return device;
}

function recordPlay(deviceId) {
  const pool = loadPool();
  const device = pool.find(d => d.id === deviceId);
  if (device) {
    device.plays = (device.plays || 0) + 1;
    if (device.plays >= CONFIG.adsPerDevice) {
      device.cooldownUntil = Date.now() + CONFIG.cooldownMs;
      device.plays = 0;
      log(`Pool: ...${deviceId.slice(-6)} → cooldown ${Math.round(CONFIG.cooldownMs/60000)}мин`, 'pool');
    } else {
      log(`Pool: ...${deviceId.slice(-6)} показов: ${device.plays}/${CONFIG.adsPerDevice}`, 'pool');
    }
    savePool(pool);
  }
}

/* УТИЛИТЫ */
function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) { hash = (hash << 5) - hash + str.charCodeAt(i); hash |= 0; }
  return Math.abs(hash);
}
function showLoader(show) { show ? loader.classList.remove("hidden") : loader.classList.add("hidden"); }
function bumpGlobalIndex() { globalPlayIndex++; localStorage.setItem("vastGlobalIndex", globalPlayIndex); }

/* VAST */
function buildVastUrl(deviceId, playIndex) {
  const groupSize   = 3;
  const deviceGroup = hashCode(deviceId) % groupSize;
  const segment     = Math.floor(playIndex / groupSize);
  const shuffle     = Math.random() > 0.7 ? 1 : 0;
  const cb          = Date.now() + Math.floor(Math.random() * 999999);
  return `https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id=${deviceId}&domain=t.me&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=mobile&segment=${segment}&group=${deviceGroup}&shuffle=${shuffle}&play_index=${playIndex}&cb=${cb}`;
}

async function fetchWithTimeout(url, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    return await res.text();
  } catch(e) { clearTimeout(timer); throw e; }
}

async function resolveVast(url, depth = 0) {
  if (depth > 5) throw new Error("VAST wrapper depth exceeded");
  log(`VAST fetch [depth=${depth}]: ${url.slice(0,80)}...`, 'vast');
  const xml = await fetchWithTimeout(url, CONFIG.fetchTimeoutMs);
  log(`VAST ответ: ${xml.length} байт`, 'vast');
  const wrapper = xml.match(/<VASTAdTagURI><!\[CDATA\[([\s\S]*?)\]\]>/);
  if (wrapper) { log(`VAST wrapper → цепочка`, 'vast'); return resolveVast(wrapper[1].trim(), depth + 1); }
  const hasMedia = xml.includes('MediaFile') || xml.includes('.mp4');
  log(`VAST разобран. MediaFile: ${hasMedia ? 'найден ✓' : 'НЕ найден ✗'}`, hasMedia ? 'vast' : 'warn');
  return xml;
}

function extractMedia(xml) {
  try {
    const doc   = new DOMParser().parseFromString(xml, "text/xml");
    const media = doc.querySelector("MediaFile");
    if (media) { const url = media.textContent.trim(); log(`Media URL: ${url.slice(0,70)}...`, 'ok'); return url; }
  } catch(e) { log(`Ошибка парсинга XML: ${e.message}`, 'warn'); }
  const match = xml.match(/https?:\/\/[^\s"<>]+\.mp4/i);
  if (match) { log(`Media URL (regex): ${match[0].slice(0,70)}...`, 'ok'); return match[0]; }
  return null;
}

/* SKIP */
let skipTimer = null;

function resetSkip() {
  skipBtn.style.display = "none";
  if (skipTimer) clearTimeout(skipTimer);
}

function startSkipCountdown() {
  resetSkip();
  skipTimer = setTimeout(() => {
    skipBtn.style.display = "flex";
    log('Кнопка пропуска показана', 'debug');
  }, CONFIG.skipDelaySec * 1000);
}

/* ОСНОВНОЙ ЦИКЛ */
let currentSession = 0;

async function startAd() {
  const mySession  = ++currentSession;
  currentSessionId = mySession;

  log(`=== Сессия #${mySession} | globalIndex=${globalPlayIndex} ===`, 'info');

  resetSkip();
  setClickUrl(null);
  showLoader(true);
  video.pause();
  video.removeAttribute("src");
  video.load();

  const device    = getActiveDevice();
  currentDeviceId = device.id;

  log(`Device: ...${device.id.slice(-6)}, plays=${device.plays}`, 'info');

  for (let attempt = 1; attempt <= CONFIG.maxRetries; attempt++) {
    if (mySession !== currentSession) { log(`Сессия #${mySession} отменена`, 'debug'); return; }

    log(`Попытка ${attempt}/${CONFIG.maxRetries}`, 'info');

    try {
      const vastUrl  = buildVastUrl(device.id, globalPlayIndex);
      const xml      = await resolveVast(vastUrl);

      if (mySession !== currentSession) return;

      const mediaUrl = extractMedia(xml);
      const clickUrl = extractClickThrough(xml);

      if (!mediaUrl) {
        log(`Попытка ${attempt}: нет медиа, пауза ${CONFIG.noAdRetryMs}мс`, 'warn');
        await delay(CONFIG.noAdRetryMs);
        continue;
      }

      log(`Загрузка видео...`, 'info');
      video.src   = mediaUrl;
      video.muted = isMuted;
      video.load();

      await new Promise((resolve, reject) => {
        const onReady = () => { cleanup(); log('canplay ✓', 'ok'); resolve(); };
        const onError = () => { cleanup(); reject(new Error(`video error code=${video.error?.code}`)); };
        const onAbort = () => { cleanup(); reject(new Error("video aborted")); };
        const timer   = setTimeout(() => { cleanup(); reject(new Error("video load timeout 10s")); }, 10000);
        const cleanup = () => {
          clearTimeout(timer);
          video.removeEventListener("canplay", onReady);
          video.removeEventListener("error",   onError);
          video.removeEventListener("abort",   onAbort);
        };
        video.addEventListener("canplay", onReady);
        video.addEventListener("error",   onError);
        video.addEventListener("abort",   onAbort);
      });

      if (mySession !== currentSession) return;

      positionControls();
      showLoader(false);
      setClickUrl(clickUrl);

      try {
        await video.play();
        log('play() ✓', 'ok');
      } catch(playErr) {
        log(`play() заблокирован → muted`, 'warn');
        video.muted = true; isMuted = true;
        muteBtn.textContent = '🔇';
        muteBtn.classList.add('muted');
        await video.play();
        log('play() muted ✓', 'ok');
      }

      startSkipCountdown();
      recordPlay(device.id);
      bumpGlobalIndex();
      log(`Ролик запущен ✓ globalIndex → ${globalPlayIndex}`, 'ok');
      return;

    } catch(e) {
      if (mySession !== currentSession) return;
      const msg = e.name === "AbortError" ? "таймаут запроса" : e.message;
      log(`ОШИБКА попытки ${attempt}: ${msg}`, 'error');
      await delay(CONFIG.retryDelayMs * attempt);
    }
  }

  if (mySession !== currentSession) return;
  log(`Все попытки провалились → пауза 3с`, 'error');
  showLoader(false);
  await delay(3000);
  startAd();
}

function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

/* СОБЫТИЯ ВИДЕО */
video.addEventListener("ended", () => {
  log('Видео завершено', 'ok');
  resetSkip(); setClickUrl(null);
  startAd();
});
video.addEventListener("error", () => {
  if (!video.src || video.src === window.location.href) return;
  log(`video.error: code=${video.error?.code}`, 'warn');
});
video.addEventListener("waiting", () => log('Буферизация...', 'debug'));
video.addEventListener("stalled", () => log('Зависание потока (stalled)', 'warn'));
video.addEventListener("playing", () => log('Воспроизведение (playing)', 'debug'));

skipBtn.onclick = () => { log('Skip', 'info'); resetSkip(); setClickUrl(null); startAd(); };

closeBtn.onclick = () => {
  log('Закрытие плеера', 'info');
  video.pause();
  if (window.Telegram?.WebApp) window.Telegram.WebApp.close();
  else window.location.href = "index.html";
};

/* СТАРТ */
log('Плеер запущен', 'ok');
log(`Config: adsPerDevice=${CONFIG.adsPerDevice}, cooldown=${CONFIG.cooldownMs/60000}мин, poolSize=${CONFIG.poolSize}`, 'debug');
log(`Sheets: ${CONFIG.sheetsEnabled ? 'включён ✓' : 'выключен'}`, 'info');
log(`globalPlayIndex: ${globalPlayIndex}`, 'debug');

startAd();

</script>
</body>
</html>
