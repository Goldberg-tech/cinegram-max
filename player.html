<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VAST Player</title>
<style>

body{
background:#000;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

video{
width:720px;
background:#000;
}

#status{
position:absolute;
top:10px;
left:10px;
color:#fff;
font-family:Arial;
font-size:14px;
}

</style>
</head>
<body>

<div id="status">loading ad...</div>

<video id="video" playsinline></video>

<script>

const video = document.getElementById("video");
const status = document.getElementById("status");


// DEVICE ID (постоянный)
function getDevice(){

let id = localStorage.getItem("device_id");

if(!id){

id = "dev_"+Math.random().toString(36).slice(2);

localStorage.setItem("device_id",id);

}

return id;

}



// VAST URL
function buildVastUrl(){

const device = getDevice();

const cb = Date.now()+Math.floor(Math.random()*999999);

return `https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id=${device}&domain=t.me&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=mobile&cb=${cb}`;

}



// загрузка VAST
async function fetchText(url){

const r = await fetch(url);

return await r.text();

}



// раскрытие wrapper
async function resolveVast(url){

let xml = await fetchText(url);


// wrapper
let wrapper = xml.match(/<VASTAdTagURI><!\[CDATA\[(.*?)\]\]>/);

if(wrapper){

let next = wrapper[1].trim();

console.log("wrapper →",next);

return resolveVast(next);

}

return xml;

}



// извлечение mp4
function extractMedia(xml){

let doc;

try{

doc = new DOMParser().parseFromString(xml,"text/xml");

let media = doc.querySelector("MediaFile");

if(media) return media.textContent.trim();

}catch(e){}


// fallback
let match = xml.match(/https:\/\/[^ ]+\.mp4/);

if(match) return match[0];

return null;

}



// извлечение tracking
function extractTracking(xml){

const events = {};

const regex = /(https:\/\/[^ ]+(impression|start|firstQuartile|midpoint|thirdQuartile|complete)[^ ]*)/g;

let m;

while((m = regex.exec(xml)) !== null){

let url = m[1];

if(url.includes("impression")) events.impression ??= [];
if(url.includes("start")) events.start ??= [];
if(url.includes("firstQuartile")) events.q1 ??= [];
if(url.includes("midpoint")) events.q2 ??= [];
if(url.includes("thirdQuartile")) events.q3 ??= [];
if(url.includes("complete")) events.complete ??= [];

}

return events;

}



// отправка tracking
function fire(url){

fetch(url).catch(()=>{});

}



// запуск рекламы
async function startAd(){

try{

status.innerText="requesting ad";

const vastUrl = buildVastUrl();

let xml = await resolveVast(vastUrl);

const media = extractMedia(xml);

if(!media){

status.innerText="no ad";

return;

}

status.innerText="playing ad";

console.log("media",media);

video.src = media;

video.play();

}catch(e){

status.innerText="error";

console.error(e);

}

}



// quartile tracking
video.addEventListener("timeupdate",()=>{

if(!video.duration) return;

const p = video.currentTime/video.duration;

if(p>0.25 && !video.q1){
video.q1=true;
console.log("25%");
}

if(p>0.5 && !video.q2){
video.q2=true;
console.log("50%");
}

if(p>0.75 && !video.q3){
video.q3=true;
console.log("75%");
}

});



video.addEventListener("ended",()=>{

status.innerText="ad finished";

});



startAd();

</script>

</body>
</html>
