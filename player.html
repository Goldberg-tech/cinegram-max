<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VAST Player</title>

<style>

body{
  background:#000;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
}

/* PLAYER WRAPPER */

#playerWrapper{
  position:relative;
  width:720px;
  max-width:100vw;
  margin:auto;
}

/* VIDEO */

#playerWrapper video{
  width:100%;
  background:#000;
  display:block;
}

/* STATUS */

#status{
  position:absolute;
  top:10px;
  left:10px;
  color:#fff;
  font-size:14px;
  z-index:1000;
}

/* CLOSE BUTTON */

#closeBtn{
  position:absolute;
  top:12px;
  right:16px;
  color:#fff;
  font-size:28px;
  cursor:pointer;
  z-index:1001;
}

/* SKIP BUTTON */

#skipBtn{
  position:absolute;
  bottom:22px;
  right:22px;
  padding:10px 18px;
  background:rgba(255,255,255,0.2);
  color:white;
  border-radius:8px;
  cursor:pointer;
  display:none;
  z-index:1001;
  backdrop-filter: blur(6px);
}

</style>
</head>

<body>

<div id="playerWrapper">

  <div id="status">loading ad...</div>

  <div id="closeBtn">✕</div>
  <div id="skipBtn">Skip</div>

  <video id="video" playsinline></video>

</div>

<script>

const video = document.getElementById("video");
const status = document.getElementById("status");
const closeBtn = document.getElementById("closeBtn");
const skipBtn = document.getElementById("skipBtn");

/* ===== DEVICE ID ===== */

function getDevice(){

  let id = localStorage.getItem("device_id");

  if(!id){
    id = "dev_"+Math.random().toString(36).slice(2);
    localStorage.setItem("device_id",id);
  }

  return id;
}

/* HASH */

function hashCode(str){
  let hash = 0;
  for(let i=0;i<str.length;i++){
    hash = (hash<<5)-hash + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

/* PLAYBACK STATE */

let playCounter = 0;

/* VAST URL */

function buildVastUrl(){

  const device = getDevice();

  const groupSize = 3;
  const deviceGroup = hashCode(device) % groupSize;

  const segment = Math.floor(playCounter / groupSize);

  const shuffle = Math.random() > 0.7 ? 1 : 0;

  const cb = Date.now() + Math.floor(Math.random()*999999);

  return `https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id=${device}&domain=t.me&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=mobile&segment=${segment}&group=${deviceGroup}&shuffle=${shuffle}&play_index=${playCounter}&cb=${cb}`;
}

/* FETCH */

async function fetchText(url){
  return await (await fetch(url)).text();
}

/* WRAPPER RESOLVE */

async function resolveVast(url){

  let xml = await fetchText(url);

  let wrapper = xml.match(/<VASTAdTagURI><!\[CDATA\[(.*?)\]\]>/);

  if(wrapper){
    return resolveVast(wrapper[1].trim());
  }

  return xml;
}

/* MEDIA EXTRACT */

function extractMedia(xml){

  try{
    let doc = new DOMParser().parseFromString(xml,"text/xml");
    let media = doc.querySelector("MediaFile");
    if(media) return media.textContent.trim();
  }catch(e){}

  let match = xml.match(/https:\/\/[^ ]+\.mp4/);

  return match ? match[0] : null;
}

/* SKIP */

let skipTimer;

function startSkipCountdown(){

  skipBtn.style.display="none";

  if(skipTimer) clearTimeout(skipTimer);

  skipTimer = setTimeout(()=>{
    skipBtn.style.display="block";
  },5000);
}

/* PLAYER */

async function startAd(){

  try{

    status.innerText="requesting ad...";

    const vastUrl = buildVastUrl();

    let xml = await resolveVast(vastUrl);

    const media = extractMedia(xml);

    if(!media){

      status.innerText="no ad";

      setTimeout(()=>{
        playCounter++;
        startAd();
      },2000);

      return;
    }

    status.innerText="playing ad";

    video.src = media;
    await video.play();

    startSkipCountdown();

    playCounter++;

  }catch(e){

    console.error(e);

    status.innerText="error";

    setTimeout(startAd,3000);
  }
}

/* EVENTS */

video.addEventListener("ended",()=>{
  status.innerText="ad finished";
  startAd();
});

/* Skip */

skipBtn.onclick=()=>{
  video.pause();
  startAd();
};

/* Close → Telegram WebApp safe exit */

closeBtn.onclick=()=>{

  video.pause();

  if(document.fullscreenElement){
    document.exitFullscreen();
  }

  if(window.Telegram?.WebApp){
    window.Telegram.WebApp.close();
  }else{
    window.location.href="index.html";
  }
};

/* AUTO START */

startAd();

</script>

</body>
</html>
