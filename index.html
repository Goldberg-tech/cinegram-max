<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

<style>

body{
margin:0;
background:black;
}

#video{
width:100vw;
height:100vh;
object-fit:cover;
}

</style>

</head>

<body>

<video id="video" autoplay muted playsinline></video>

<script>

const vastTag =
"https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id=test123&client_version=&domain=localhost&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=mobile";

const video = document.getElementById("video");

const adDisplayContainer = new google.ima.AdDisplayContainer(document.body, video);

const adsLoader = new google.ima.AdsLoader(adDisplayContainer);

const adsRequest = new google.ima.AdsRequest();

adsRequest.adTagUrl = vastTag;

adsRequest.linearAdSlotWidth = window.innerWidth;
adsRequest.linearAdSlotHeight = window.innerHeight;

adsLoader.addEventListener(
google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
onAdsManagerLoaded
);

adsLoader.addEventListener(
google.ima.AdErrorEvent.Type.AD_ERROR,
onAdError
);

adsLoader.requestAds(adsRequest);

function onAdsManagerLoaded(event){

const adsManager = event.getAdsManager(video);

adsManager.init(window.innerWidth,window.innerHeight,google.ima.ViewMode.NORMAL);

adsManager.start();

}

function onAdError(e){

console.log("Ad error",e);

}

</script>

</body>
</html>
