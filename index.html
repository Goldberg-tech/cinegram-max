<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TMA VAST Ads</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

<style>
body{
margin:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

#container{
position:relative;
width:100%;
max-width:420px;
}

video{
width:100%;
background:#000;
}

#adContainer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

#startBtn{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
font-size:16px;
background:#0088cc;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="container">

<video id="contentVideo" playsinline></video>

<div id="adContainer"></div>

<button id="startBtn">Смотреть рекламу</button>

</div>

<script>

const video = document.getElementById('contentVideo')
const adContainer = document.getElementById('adContainer')
const startBtn = document.getElementById('startBtn')

let adsLoader
let adsManager

function getUID(){
    if(window.Telegram?.WebApp?.initDataUnsafe?.user?.id){
        return Telegram.WebApp.initDataUnsafe.user.id
    }
    return 'web_'+Math.random().toString(36).substring(2)
}

function getDomain(){
    return location.hostname
}

function buildVAST(){
    const uid = getUID()
    const domain = getDomain()
    const isMobile = /Android|iPhone/i.test(navigator.userAgent)

    const base = isMobile
        ? "https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id="+uid+"&client_version=&domain="+domain+"&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=mobile"
        : "https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id="+uid+"&client_version=&domain="+domain+"&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=desktop"

    return base
}

function initIMA(){
    const adDisplayContainer = new google.ima.AdDisplayContainer(
        adContainer,
        video
    )
    adDisplayContainer.initialize() // Важная инициализация перед показом рекламы

    adsLoader = new google.ima.AdsLoader(adDisplayContainer)

    adsLoader.addEventListener(
        google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
        onAdsManagerLoaded,
        false
    )

    adsLoader.addEventListener(
        google.ima.AdErrorEvent.Type.AD_ERROR,
        onAdError,
        false
    )
}

function requestAds(){
    const vastUrl = buildVAST()

    const adsRequest = new google.ima.AdsRequest()
    adsRequest.adTagUrl = vastUrl
    adsRequest.linearAdSlotWidth = 640
    adsRequest.linearAdSlotHeight = 360
    adsRequest.nonLinearAdSlotWidth = 640
    adsRequest.nonLinearAdSlotHeight = 150

    adsLoader.requestAds(adsRequest)
}

function onAdsManagerLoaded(event){
    adsManager = event.getAdsManager(video)

    adsManager.addEventListener(
        google.ima.AdErrorEvent.Type.AD_ERROR,
        onAdError
    )

    adsManager.init(640,360,google.ima.ViewMode.NORMAL)
    adsManager.start()
}

function onAdError(error){
    console.log("Ad error", error)
    video.play()
}

startBtn.onclick = () => {
    startBtn.style.display = "none"
    initIMA()
    requestAds()
}

</script>

</body>
</html>
