<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telepub</title>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:Arial;
color:white;
overflow-x:hidden;
}

.section{
padding:20px;
}

.section h2{
margin:10px 0 15px;
font-size:22px;
}

.row{
display:flex;
gap:18px;
overflow-x:auto;
padding-bottom:10px;
}

.row::-webkit-scrollbar{
display:none;
}

.poster{
min-width:180px;
height:270px;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:transform .25s;
flex-shrink:0;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.poster img{
width:100%;
height:100%;
object-fit:cover;
}

.poster:hover{
transform:scale(1.08);
}

.title{
margin-top:8px;
font-size:16px;
}

/* PLAYER */

.playerOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.92);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.playerBox{
width:90%;
max-width:900px;
aspect-ratio:16/9;
background:black;
}

.closeBtn{
position:absolute;
top:20px;
right:25px;
font-size:30px;
cursor:pointer;
}

</style>
</head>


<body>

<div class="section">

<h2>Популярное</h2>

<div class="row">

<div class="poster" onclick="playAd()">
<img src="posters/drstrange.jpg">
</div>

<div class="poster" onclick="playAd()">
<img src="posters/darkknight.jpg">
</div>

<div class="poster" onclick="playAd()">
<img src="posters/joker.jpg">
</div>

</div>


<h2>Сериалы</h2>

<div class="row">

<div class="poster" onclick="playAd()">
<img src="posters/ad_astra.jpg">
</div>

<div class="poster" onclick="playAd()">
<img src="posters/avengers.jpg">
</div>

<div class="poster" onclick="playAd()">
<img src="posters/raya.jpg">
</div>

<div class="poster" onclick="playAd()">
<img src="posters/badboys.jpg">
</div>

</div>

</div>



<div class="playerOverlay" id="playerOverlay">

<div class="closeBtn" onclick="closePlayer()">✕</div>

<div class="playerBox">
<iframe id="vastFrame"
width="100%"
height="100%"
frameborder="0"
allow="autoplay">
</iframe>
</div>

</div>


<script>

function generateUID(){
return 'uid-'+Math.random().toString(36).substr(2,9)
}

function getDevice(){

if(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){
return "mobile"
}else{
return "desktop"
}

}

function buildVast(){

let uid = generateUID()
let domain = location.hostname || "tma"
let device = getDevice()

let base="https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id="+uid+"&client_version=&domain="+domain+"&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB"

if(device=="mobile"){
base += "&web_client_type=mobile"
}else{
base += "&web_client_type=desktop"
}

return base

}

function playAd(){

let url = buildVast()

document.getElementById("vastFrame").src = url
document.getElementById("playerOverlay").style.display="flex"

}

function closePlayer(){

document.getElementById("vastFrame").src=""
document.getElementById("playerOverlay").style.display="none"

}

</script>

</body>
</html>
