<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CineGram</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<!-- ШАПКА -->
<header class="site-header">
  <div class="logo">Cine<span>Gram</span></div>
</header>

<!-- HERO БАННЕР -->
<div class="hero">
  <div class="hero-slider" id="hero"></div>
  <div class="hero-gradient"></div>
  <div class="hero-dots" id="heroDots"></div>
</div>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<div class="content">

  <section>
    <div class="section-header">
      <div class="section-title">Популярное</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="popular"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Сериалы</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="series"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Комедии</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="comedy"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Боевики</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="action"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Криминал</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="crime"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Драмы</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="drama"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Триллеры</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="thriller"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Военные</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="war"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Детективы</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="detective"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Биография</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="biography"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Фантастика</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="scifi"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Мультфильмы</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="cartoon"></div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-title">Аниме</div>
      <div class="section-line"></div>
    </div>
    <div class="row" id="anime"></div>
  </section>

</div>

<!-- МОДАЛ ПОДТВЕРЖДЕНИЯ ВЫХОДА -->
<div class="exit-modal" id="exitModal">
  <div class="exit-modal-backdrop" id="exitBackdrop"></div>
  <div class="exit-modal-sheet">
    <div class="exit-modal-handle"></div>
    <div class="exit-modal-title">Выйти из приложения?</div>
    <div class="exit-modal-sub">Вы уверены, что хотите закрыть CineGram?</div>
    <div class="exit-modal-btns">
      <button class="exit-btn-cancel"  id="exitCancel">Остаться</button>
      <button class="exit-btn-confirm" id="exitConfirm">Выйти</button>
    </div>
  </div>
</div>

<script src="js/movies.js"></script>
<script src="js/app.js"></script>
<script src="js/slider.js"></script>
</body>
</html>
