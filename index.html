<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Кинотеатр</title>

<script src="https://cdn.jsdelivr.net/npm/video.js@7/dist/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/videojs-contrib-ads@6/dist/videojs.ads.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/videojs-vast-vpaid@2/dist/videojs.vast.vpaid.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/video.js@7/dist/video-js.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
margin-bottom:20px;
}

.vitrina{
display:flex;
gap:20px;
overflow-x:auto;
padding-bottom:20px;
}

.vitrina::-webkit-scrollbar{
display:none;
}

.card{
min-width:240px;
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:240px;
height:360px;
object-fit:cover;
border-radius:16px;
}

.title{
margin-top:10px;
font-size:16px;
}

#playerModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

#vastPlayer{
width:90%;
max-width:900px;
}

.close{
position:absolute;
top:30px;
right:40px;
font-size:40px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Сериалы</h1>

<div class="vitrina">

<div class="card" onclick="playAd()">
<img src="posters/molodezhka.jpg">
<div class="title">Молодежка</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/kuhnya.jpg">
<div class="title">Кухня</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/grand.jpg">
<div class="title">Гранд</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/deti-peremen.jpg">
<div class="title">Дети перемен</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/slovo-pacana.jpg">
<div class="title">Слово пацана</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/obnalshik.jpg">
<div class="title">Обнальщик</div>
</div>

</div>


<div id="playerModal">

<div class="close" onclick="closePlayer()">×</div>

<video
id="vastPlayer"
class="video-js vjs-default-skin"
controls
playsinline
></video>

</div>


<script>

let player

function generateUID(){
return 'uid-'+Math.random().toString(36).substring(2,10)
}

function getDevice(){

if(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){
return "mobile"
}else{
return "desktop"
}

}

function buildVAST(){

let uid = generateUID()

let device = getDevice()

let domain = location.hostname || "tma"

let url = "https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott"
+"&client_id="+uid
+"&client_version="
+"&domain="+domain
+"&embedded=P5"
+"&is_child=false"
+"&is_paid=0"
+"&location=100001"
+"&san=web_vast_code"
+"&ad_position=1"
+"&content_id=23080"
+"&device_type=NCWEB"

if(device=="mobile"){
url += "&web_client_type=mobile"
}else{
url += "&web_client_type=desktop"
}

return url

}

function playAd(){

document.getElementById("playerModal").style.display="flex"

let vastTag = buildVAST()

player = videojs('vastPlayer')

player.vastClient({
adTagUrl: vastTag,
playAdAlways: true,
verbosity: 0
})

player.muted(false)
player.play()

}

function closePlayer(){

if(player){
player.dispose()
}

document.getElementById("playerModal").style.display="none"

}

</script>

</body>
</html>
