<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
background:black;
}

video{
width:100vw;
height:100vh;
object-fit:cover;
}

</style>

</head>

<body>

<video id="player" autoplay muted playsinline controls></video>

<script>

const vastUrl =
"https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id=test123&client_version=&domain=localhost&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=mobile";

async function loadVast(url){

const res = await fetch(url);
const text = await res.text();

const xml = new DOMParser().parseFromString(text,"text/xml");

const wrapper = xml.querySelector("VASTAdTagURI");

if(wrapper){

const next = wrapper.textContent.trim();

console.log("Wrapper ->",next);

return loadVast(next);

}

const media = xml.querySelector("MediaFile");

if(media){

const videoUrl = media.textContent.trim();

console.log("Ad video:",videoUrl);

const player = document.getElementById("player");

player.src = videoUrl;

player.play();

}

else{

console.log("No media file");

}

}

loadVast(vastUrl);

</script>

</body>
</html>
