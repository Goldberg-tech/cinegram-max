<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>TelePub</title>

<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:Arial;
color:white;
overflow-x:hidden;
}

.section{
padding:25px;
}

.section-title{
font-size:22px;
margin-bottom:15px;
}

.row{
display:flex;
gap:16px;
overflow-x:auto;
scroll-behavior:smooth;
padding-bottom:10px;
}

.row::-webkit-scrollbar{
height:8px;
}

.row::-webkit-scrollbar-thumb{
background:#444;
border-radius:10px;
}

.card{
flex:0 0 auto;
width:180px;
cursor:pointer;
transition:0.25s;
}

.card img{
width:100%;
border-radius:10px;
}

.card:hover{
transform:scale(1.07);
}

#adContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:999;
}

#videoElement{
width:100%;
height:100%;
}

</style>

</head>

<body>


<div class="section">

<div class="section-title">Популярные сериалы</div>

<div class="row">

<div class="card" onclick="playAd()">
<img src="posters/molodezhka.jpg">
</div>

<div class="card" onclick="playAd()">
<img src="posters/kuhnya.jpg">
</div>

<div class="card" onclick="playAd()">
<img src="posters/grand.jpg">
</div>

<div class="card" onclick="playAd()">
<img src="posters/deti-peremen.jpg">
</div>

<div class="card" onclick="playAd()">
<img src="posters/slovo-pacana.jpg">
</div>

<div class="card" onclick="playAd()">
<img src="posters/obnal.jpg">
</div>

</div>

</div>



<div id="adContainer">
<video id="videoElement"></video>
</div>



<script>

function getUID(){

let uid = localStorage.getItem("uid");

if(!uid){
uid = crypto.randomUUID();
localStorage.setItem("uid",uid);
}

return uid;

}



function getDevice(){

if(/Mobi|Android/i.test(navigator.userAgent)){
return "mobile";
}

return "desktop";

}



function getVast(){

let uid = getUID();
let domain = location.hostname;
let type = getDevice();

if(type==="mobile"){

return `https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id=${uid}&client_version=&domain=${domain}&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=mobile`;

}else{

return `https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id=${uid}&client_version=&domain=${domain}&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=desktop`;

}

}



let adsLoader;
let adsManager;



function playAd(){

document.getElementById("adContainer").style.display="block";

let videoContent = document.getElementById("videoElement");

let adDisplayContainer = new google.ima.AdDisplayContainer(
document.getElementById("adContainer"),
videoContent
);

adDisplayContainer.initialize();

adsLoader = new google.ima.AdsLoader(adDisplayContainer);

adsLoader.addEventListener(
google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
onAdsManagerLoaded
);

adsLoader.addEventListener(
google.ima.AdErrorEvent.Type.AD_ERROR,
onAdError
);

let adsRequest = new google.ima.AdsRequest();

adsRequest.adTagUrl = getVast();

adsLoader.requestAds(adsRequest);

}



function onAdsManagerLoaded(event){

let videoContent = document.getElementById("videoElement");

adsManager = event.getAdsManager(videoContent);

adsManager.addEventListener(
google.ima.AdErrorEvent.Type.AD_ERROR,
onAdError
);

adsManager.addEventListener(
google.ima.AdEvent.Type.CONTENT_RESUME_REQUESTED,
function(){

closeAd();

}
);

adsManager.init(window.innerWidth,window.innerHeight,google.ima.ViewMode.NORMAL);

adsManager.start();

}



function onAdError(){

closeAd();

}



function closeAd(){

document.getElementById("adContainer").style.display="none";

}

</script>

</body>
</html>
