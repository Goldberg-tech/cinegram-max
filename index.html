<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wink VAST MiniApp</title>
<style>
body {margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh;}
#wink-player {width:100%; max-width:420px; height:236px;}
button {position:absolute; bottom:20px; left:50%; transform:translateX(-50%); padding:12px 20px; font-size:16px; background:#0088cc; color:white; border:none; border-radius:8px; cursor:pointer;}
</style>
</head>
<body>

<div id="wink-player"></div>
<button id="playAdBtn">Смотреть рекламу</button>

<script src="https://static-adtech.wink.ru/embed-sdk/winkembed.umd.js"></script>
<script>
const container = document.getElementById("wink-player");
const playBtn = document.getElementById("playAdBtn");

function getUID() {
  return window.Telegram?.WebApp?.initDataUnsafe?.user?.id || 'web_'+Math.random().toString(36).substring(2);
}
function getDomain() { return location.hostname; }

function buildFrameOptions() {
  const uid = getUID();
  const domain = getDomain();
  return {
    trackId: 23080,      // ID контента / плейсхолдер для рекламы
    partnerId: 'P0',
    frameOptions: { width: "100%", height: "236px", allowFullscreen: true },
    params: {
      client_id: uid,
      domain: domain,
      web_client_type: "mobile"
    }
  };
}

playBtn.onclick = () => {
  playBtn.style.display = "none";
  WinkEmbedSDK.api.insertFrame(container, buildFrameOptions());
};
</script>

</body>
</html>
