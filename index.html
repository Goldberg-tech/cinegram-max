<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Кинотеатр</title>

<script src="https://cdn.jsdelivr.net/npm/video.js@7/dist/video.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/video.js@7/dist/video-js.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
margin-bottom:20px;
}

.vitrina{
display:flex;
gap:16px;
overflow-x:auto;
padding-bottom:20px;
}

.card{
min-width:180px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:12px;
}

.title{
margin-top:8px;
font-size:14px;
}

#playerModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

#playerModal video{
width:80%;
max-width:900px;
}

.close{
position:absolute;
top:30px;
right:40px;
font-size:40px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Сериалы</h1>

<div class="vitrina">

<div class="card" onclick="playAd()">
<img src="posters/papiny-dochki.jpg">
<div class="title">Папины дочки</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/kuhnya.jpg">
<div class="title">Кухня</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/granj.jpg">
<div class="title">Гранж</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/deti-peremen.jpg">
<div class="title">Дети перемен</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/slovo-pacana.jpg">
<div class="title">Слово пацана</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/obnalshik.jpg">
<div class="title">Обнальщик</div>
</div>

</div>


<div id="playerModal">

<div class="close" onclick="closePlayer()">×</div>

<video
id="vastPlayer"
class="video-js vjs-default-skin"
controls
autoplay
width="800"
height="450">

<source src="YOUR_VAST_TAG_HERE" type="application/x-mpegURL">

</video>

</div>

<script>

function playAd(){
document.getElementById("playerModal").style.display="flex";
}

function closePlayer(){
document.getElementById("playerModal").style.display="none";
}

</script>

</body>
</html>
