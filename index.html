<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Кинотеатр</title>

<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

<style>

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial;
}

h1{
padding:20px;
margin:0;
}

.vitrina{
display:flex;
gap:20px;
overflow-x:auto;
padding:20px;
}

.vitrina::-webkit-scrollbar{
display:none;
}

.card{
min-width:65vw;
cursor:pointer;
}

.card img{
width:65vw;
height:90vw;
object-fit:cover;
border-radius:20px;
}

.title{
margin-top:10px;
font-size:18px;
}

#playerModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#videoContainer{
width:100%;
max-width:900px;
position:relative;
}

video{
width:100%;
display:block;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:35px;
cursor:pointer;
z-index:10000;
}

#adTimer{
position:absolute;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:8px 12px;
border-radius:8px;
font-size:14px;
z-index:9999;
}

#skipAd{
position:absolute;
bottom:20px;
right:20px;
background:#ff0000;
border:none;
padding:10px 16px;
color:white;
border-radius:8px;
display:none;
z-index:9999;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Сериалы</h1>

<div class="vitrina">

<div class="card" onclick="playAd()">
<img src="posters/molodezhka.jpg">
<div class="title">Молодежка</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/kuhnya.jpg">
<div class="title">Кухня</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/grand.jpg">
<div class="title">Гранд</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/deti-peremen.jpg">
<div class="title">Дети перемен</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/slovo-pacana.jpg">
<div class="title">Слово пацана</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/obnalshik.jpg">
<div class="title">Обнальщик</div>
</div>

</div>

<div id="playerModal">

<div class="close" onclick="closePlayer()">×</div>

<div id="videoContainer">

<video id="video" playsinline webkit-playsinline></video>

<div id="adContainer"></div>

<div id="adTimer"></div>

<button id="skipAd" onclick="skipAd()">Пропустить</button>

</div>

</div>

<script>

let adDisplayContainer
let adsLoader
let adsManager

function playAd(){

document.getElementById("playerModal").style.display="flex"

let video = document.getElementById("video")
let adContainer = document.getElementById("adContainer")

adContainer.innerHTML=""

let uid = localStorage.getItem("uid")

if(!uid){
uid = "uid"+Math.floor(Math.random()*999999999)
localStorage.setItem("uid", uid)
}

let device = /Android|iPhone/i.test(navigator.userAgent) ? "mobile" : "desktop"

let domain = window.location.hostname

let vastUrl =
"https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll"
+"&age_value=18"
+"&broadcast_type=ott"
+"&client_id="+uid
+"&client_version="
+"&domain="+domain
+"&embedded=P5"
+"&is_child=false"
+"&is_paid=0"
+"&location=100001"
+"&san=web_vast_code"
+"&ad_position=1"
+"&content_id=23080"
+"&device_type=NCWEB"
+"&web_client_type="+device

adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, video)

adsLoader = new google.ima.AdsLoader(adDisplayContainer)

adsLoader.addEventListener(
google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
onAdsManagerLoaded,
false)

adsLoader.addEventListener(
google.ima.AdErrorEvent.Type.AD_ERROR,
onAdError,
false)

let adsRequest = new google.ima.AdsRequest()

adsRequest.adTagUrl = vastUrl
adsRequest.linearAdSlotWidth = window.innerWidth
adsRequest.linearAdSlotHeight = window.innerHeight

adsLoader.requestAds(adsRequest)

adDisplayContainer.initialize()

}

function onAdsManagerLoaded(event){

let video = document.getElementById("video")

adsManager = event.getAdsManager(video)

adsManager.init(
window.innerWidth,
window.innerHeight,
google.ima.ViewMode.NORMAL
)

adsManager.start()

}

function onAdError(error){

console.log("Ad error", error)

closePlayer()

}

function closePlayer(){

document.getElementById("playerModal").style.display="none"

if(adsManager){
adsManager.destroy()
adsManager = null
}

}

</script>

</body>
</html>
