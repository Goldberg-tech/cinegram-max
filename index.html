<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TelePub</title>

<script src="https://cdn.jsdelivr.net/npm/video.js@7/dist/video.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/video.js@7/dist/video-js.min.css" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0b0b;
font-family:Arial;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:20px;
padding:20px;
}

.card{
cursor:pointer;
transition:0.3s;
}

.card img{
width:100%;
border-radius:10px;
}

.card:hover{
transform:scale(1.05);
}

#ad{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:999;
}

</style>
</head>

<body>

<div class="grid">

<div class="card" onclick="playAd()">
<img src="posters/grand.jpg">
</div>

<div class="card" onclick="playAd()">
<img src="posters/witcher.jpg">
</div>

<div class="card" onclick="playAd()">
<img src="posters/lastofus.jpg">
</div>

<div class="card" onclick="playAd()">
<img src="posters/dune.jpg">
</div>

<div class="card" onclick="playAd()">
<img src="posters/avatar.jpg">
</div>

</div>


<div id="ad">

<video
id="player"
class="video-js vjs-default-skin"
controls
autoplay
playsinline
width="100%"
height="100%">
</video>

</div>


<script>

const player = videojs("player");

function deviceUID(){

let uid = localStorage.getItem("uid");

if(!uid){
uid = crypto.randomUUID();
localStorage.setItem("uid",uid);
}

return uid;

}

function deviceType(){

if(/Mobi|Android/i.test(navigator.userAgent)){
return "mobile";
}

return "desktop";

}

function vastURL(){

let uid=deviceUID();
let domain=location.hostname;
let type=deviceType();

if(type==="mobile"){

return `https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id=${uid}&client_version=&domain=${domain}&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=mobile`;

}else{

return `https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id=${uid}&client_version=&domain=${domain}&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=desktop`;

}

}



async function fetchVast(url, depth=0){

if(depth>5) throw "wrapper loop";

const res = await fetch(url);
const xmlText = await res.text();

const xml = new DOMParser().parseFromString(xmlText,"text/xml");

const wrapper = xml.querySelector("Wrapper VASTAdTagURI");

if(wrapper){

const next = wrapper.textContent.trim();
return fetchVast(next, depth+1);

}

return xml;

}



async function playAd(){

document.getElementById("ad").style.display="block";

try{

const xml = await fetchVast(vastURL());

const media = xml.querySelector("MediaFile");

if(!media){

console.log("VAST без MediaFile",xml);
closeAd();
return;

}

const videoURL = media.textContent.trim();

player.src({
src:videoURL,
type:"video/mp4"
});

player.play();

}catch(e){

console.error(e);
closeAd();

}

}



player.on("ended",function(){

closeAd();

});



function closeAd(){

player.pause();
document.getElementById("ad").style.display="none";

}



</script>

</body>
</html>
