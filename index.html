<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TMA VAST Ads</title>
<style>
body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#000;}
#iframeContainer{width:100%;max-width:420px;height:236px;}
button{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 20px;font-size:16px;background:#0088cc;color:white;border:none;border-radius:8px;cursor:pointer;}
</style>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="iframeContainer"></div>
<button id="startBtn">Смотреть рекламу</button>

<script>
const startBtn = document.getElementById('startBtn')
const iframeContainer = document.getElementById('iframeContainer')

function getUID(){
  return window.Telegram?.WebApp?.initDataUnsafe?.user?.id || 'web_'+Math.random().toString(36).substring(2)
}
function getDomain(){ return location.hostname }

function buildVAST(){
  const uid = getUID()
  const domain = getDomain()
  const isMobile = /Android|iPhone/i.test(navigator.userAgent)
  return isMobile
    ? "https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id="+uid+"&client_version=&domain="+domain+"&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=mobile"
    : "https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll&age_value=18&broadcast_type=ott&client_id="+uid+"&client_version=&domain="+domain+"&embedded=P5&is_child=false&is_paid=0&location=100001&san=web_vast_code&ad_position=1&content_id=23080&device_type=NCWEB&web_client_type=desktop"
}

startBtn.onclick = ()=>{
  startBtn.style.display='none'
  const iframe = document.createElement('iframe')
  iframe.src = buildVAST()
  iframe.width='100%'
  iframe.height='100%'
  iframe.style.border='0'
  iframeContainer.appendChild(iframe)
}
</script>

</body>
</html>
