<script>

let adDisplayContainer
let adsLoader
let adsManager

let adCount = 0
let maxAds = 3

let timerInterval

function playAd(){

adCount = 0

document.getElementById("playerModal").style.display="flex"

let video = document.getElementById("video")
let adContainer = document.getElementById("adContainer")

video.muted = true
video.play().catch(()=>{})

/* СОЗДАЕМ контейнер сразу при клике */

adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, video)

adDisplayContainer.initialize()

startAdRequest()

}

function startAdRequest(){

let video = document.getElementById("video")

let uid = localStorage.getItem("uid")

if(!uid){
uid = "uid"+Math.floor(Math.random()*999999999)
localStorage.setItem("uid", uid)
}

let device = /Android|iPhone/i.test(navigator.userAgent) ? "mobile" : "desktop"

let domain = window.location.hostname

let vastUrl =
"https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll"
+"&age_value=18"
+"&broadcast_type=ott"
+"&client_id="+uid
+"&client_version="
+"&domain="+domain
+"&embedded=P5"
+"&is_child=false"
+"&is_paid=0"
+"&location=100001"
+"&san=web_vast_code"
+"&ad_position=1"
+"&content_id=23080"
+"&device_type=NCWEB"
+"&web_client_type="+device
+"&cb="+Date.now()
+"&rnd="+Math.floor(Math.random()*1000000000)

adsLoader = new google.ima.AdsLoader(adDisplayContainer)

adsLoader.addEventListener(
google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
onAdsManagerLoaded
)

adsLoader.addEventListener(
google.ima.AdErrorEvent.Type.AD_ERROR,
onAdError
)

let adsRequest = new google.ima.AdsRequest()

adsRequest.adTagUrl = vastUrl

adsRequest.linearAdSlotWidth = window.innerWidth
adsRequest.linearAdSlotHeight = window.innerHeight

adsLoader.requestAds(adsRequest)

}

function onAdsManagerLoaded(event){

let video = document.getElementById("video")

adsManager = event.getAdsManager(video)

adsManager.init(
window.innerWidth,
window.innerHeight,
google.ima.ViewMode.NORMAL
)

adsManager.start()

adsManager.addEventListener(
google.ima.AdEvent.Type.COMPLETE,
onAdComplete
)

adsManager.addEventListener(
google.ima.AdEvent.Type.STARTED,
startAdTimer
)

}

function onAdComplete(){

clearInterval(timerInterval)

document.getElementById("skipAd").style.display="none"

adCount++

if(adCount < maxAds){

startAdRequest()

}else{

closePlayer()

}

}

function startAdTimer(){

let timer = document.getElementById("adTimer")

setTimeout(()=>{

document.getElementById("skipAd").style.display="block"

},5000)

timerInterval = setInterval(()=>{

if(!adsManager) return

let remaining = Math.round(adsManager.getRemainingTime())

timer.innerText = "Реклама: "+remaining+" сек"

if(remaining <= 0){

clearInterval(timerInterval)

}

},500)

}

function skipAd(){

if(adsManager){
adsManager.stop()
}

}

function onAdError(error){

console.log("Ad error", error)

closePlayer()

}

function closePlayer(){

document.getElementById("playerModal").style.display="none"

clearInterval(timerInterval)

document.getElementById("skipAd").style.display="none"

if(adsManager){
adsManager.destroy()
adsManager = null
}

}

</script>
