<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Кинотеатр</title>

<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

<style>

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial;
}

h1{
padding:20px;
margin:0;
}

.vitrina{
display:flex;
gap:20px;
overflow-x:auto;
padding:20px;
}

.vitrina::-webkit-scrollbar{
display:none;
}

.card{
min-width:65vw;
cursor:pointer;
}

.card img{
width:65vw;
height:90vw;
object-fit:cover;
border-radius:20px;
}

.title{
margin-top:10px;
font-size:18px;
}

#playerModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}

#adText{
text-align:center;
padding:15px;
background:#111;
width:100%;
}

#videoContainer{
width:100%;
max-width:900px;
position:relative;
}

video{
width:100%;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:35px;
cursor:pointer;
z-index:10000;
}

#adTimer{
position:absolute;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:8px 12px;
border-radius:8px;
font-size:14px;
z-index:9999;
}

#skipAd{
position:absolute;
bottom:20px;
right:20px;
background:#ff0000;
border:none;
padding:10px 16px;
color:white;
border-radius:8px;
display:none;
z-index:9999;
cursor:pointer;
}

#soundBtn{
position:absolute;
bottom:70px;
right:20px;
background:#222;
border:none;
color:white;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
z-index:9999;
}

</style>

</head>

<body>

<h1>Сериалы</h1>

<div class="vitrina">

<div class="card" onclick="playAd(0)">
<img src="posters/molodezhka.jpg">
<div class="title">Молодежка</div>
</div>

<div class="card" onclick="playAd(1)">
<img src="posters/kuhnya.jpg">
<div class="title">Кухня</div>
</div>

<div class="card" onclick="playAd(2)">
<img src="posters/grand.jpg">
<div class="title">Гранд</div>
</div>

</div>

<div id="playerModal">

<div class="close" onclick="closePlayer()">×</div>

<div id="adText">Просмотр начнется после рекламы</div>

<div id="videoContainer">

<video id="video" playsinline autoplay muted></video>

<div id="adContainer"></div>

<div id="adTimer"></div>

<button id="skipAd" onclick="skipAd()">Пропустить</button>

<button id="soundBtn" onclick="toggleSound()">🔊</button>

</div>

</div>

<script>

let adDisplayContainer
let adsLoader
let adsManager

let adCount=0
let maxAds=3

let posters=document.querySelectorAll(".card")
let currentPosterIndex=0

let timerInterval
let soundEnabled=true

const video=document.getElementById("video")
const adContainer=document.getElementById("adContainer")

adDisplayContainer=new google.ima.AdDisplayContainer(adContainer,video)

adsLoader=new google.ima.AdsLoader(adDisplayContainer)

adsLoader.addEventListener(
google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
onAdsManagerLoaded
)

adsLoader.addEventListener(
google.ima.AdErrorEvent.Type.AD_ERROR,
onAdError
)

function playAd(index){

currentPosterIndex=index
adCount=0

document.getElementById("playerModal").style.display="flex"

adDisplayContainer.initialize()

requestAd()

}

function requestAd(){

let uid=localStorage.getItem("uid")

if(!uid){
uid="uid"+Math.floor(Math.random()*999999999)
localStorage.setItem("uid",uid)
}

let device=/Android|iPhone/i.test(navigator.userAgent)?"mobile":"desktop"

let domain=window.location.hostname

let vastUrl=
"https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll"
+"&client_id="+uid
+"&domain="+domain
+"&web_client_type="+device
+"&cb="+Date.now()

let adsRequest=new google.ima.AdsRequest()

adsRequest.adTagUrl=vastUrl
adsRequest.linearAdSlotWidth=window.innerWidth
adsRequest.linearAdSlotHeight=window.innerHeight

adsLoader.requestAds(adsRequest)

}

function onAdsManagerLoaded(event){

if(adsManager){
adsManager.destroy()
}

adsManager=event.getAdsManager(video)

adsManager.addEventListener(
google.ima.AdEvent.Type.COMPLETE,
onAdComplete
)

adsManager.addEventListener(
google.ima.AdEvent.Type.STARTED,
startTimer
)

adsManager.init(
window.innerWidth,
window.innerHeight,
google.ima.ViewMode.NORMAL
)

adsManager.start()

}

function startTimer(){

setTimeout(()=>{
document.getElementById("skipAd").style.display="block"
},5000)

timerInterval=setInterval(()=>{

let remaining=Math.round(adsManager.getRemainingTime())

document.getElementById("adTimer").innerText="Реклама "+remaining+" сек"

if(remaining<=0){
clearInterval(timerInterval)
}

},500)

}

function onAdComplete(){

clearInterval(timerInterval)

document.getElementById("skipAd").style.display="none"

adCount++

if(adCount<maxAds){

requestAd()

}else{

goNextPoster()

}

}

function skipAd(){

if(adsManager){
adsManager.stop()
}

}

function toggleSound(){

soundEnabled=!soundEnabled

video.muted=!soundEnabled

document.getElementById("soundBtn").innerText=
soundEnabled?"🔊":"🔇"

}

function onAdError(e){

console.log("Ad error",e)

goNextPoster()

}

function closePlayer(){

document.getElementById("playerModal").style.display="none"

if(adsManager){
adsManager.destroy()
}

clearInterval(timerInterval)

}

function goNextPoster(){

currentPosterIndex++

if(currentPosterIndex>=posters.length){
currentPosterIndex=0
}

playAd(currentPosterIndex)

}

</script>

</body>
</html>
