<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Кинотеатр</title>
<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
<style>
body{margin:0;background:#0f0f0f;color:white;font-family:Arial;}
h1{padding:20px;margin:0;}
.vitrina{display:flex;gap:20px;overflow-x:auto;padding:20px;}
.vitrina::-webkit-scrollbar{display:none;}
.card{min-width:65vw;cursor:pointer;}
.card img{width:65vw;height:90vw;object-fit:cover;border-radius:20px;}
.title{margin-top:10px;font-size:18px;}
#playerModal{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;}
#message{margin-bottom:10px;font-size:18px;}
#videoContainer{width:100%;max-width:900px;position:relative;}
video{width:100%;}
.close{position:absolute;top:20px;right:25px;font-size:35px;cursor:pointer;z-index:10000;}
#skipAd{position:absolute;bottom:20px;right:20px;background:red;border:none;padding:10px 15px;color:white;border-radius:8px;display:none;z-index:9999;}
#timer{position:absolute;bottom:20px;left:20px;background:rgba(0,0,0,0.6);padding:6px 10px;border-radius:6px;}
#soundBtn{position:absolute;top:20px;right:20px;background:black;color:white;border:none;padding:8px 12px;border-radius:6px;z-index:9999;}
#buffering{display:none;font-size:22px;}
</style>
</head>

<body>
<h1>Сериалы</h1>

<div class="vitrina">
<div class="card" onclick="startCinema(0)"><img src="posters/molodezhka.jpg"><div class="title">Молодежка</div></div>
<div class="card" onclick="startCinema(1)"><img src="posters/kuhnya.jpg"><div class="title">Кухня</div></div>
<div class="card" onclick="startCinema(2)"><img src="posters/grand.jpg"><div class="title">Гранд</div></div>
<div class="card" onclick="startCinema(3)"><img src="posters/deti-peremen.jpg"><div class="title">Дети перемен</div></div>
<div class="card" onclick="startCinema(4)"><img src="posters/slovo-pacana.jpg"><div class="title">Слово пацана</div></div>
<div class="card" onclick="startCinema(5)"><img src="posters/obnalshik.jpg"><div class="title">Обнальщик</div></div>
</div>

<div id="playerModal">
<div class="close" onclick="closePlayer()">×</div>
<div id="message">Просмотр начнется после рекламы</div>
<div id="buffering">Загрузка фильма...</div>
<div id="videoContainer">
<button id="soundBtn" onclick="toggleSound()">🔊</button>
<video id="video" playsinline autoplay muted></video>
<div id="adContainer"></div>
<div id="timer"></div>
<button id="skipAd" onclick="skipAd()">Пропустить</button>
</div>
</div>

<script>
let adsLoader, adsManager, adDisplayContainer;
let adIndex=0, prerollCount=3;
let currentPoster=0;
let timerInterval, midrollTimer;
const posters=document.querySelectorAll(".card");

function startCinema(index){
  currentPoster=index;
  document.getElementById("playerModal").style.display="flex";
  document.getElementById("buffering").style.display="none";
  document.getElementById("message").innerText="Просмотр начнется после рекламы";
  resetAds();
  requestAd();
}

function resetAds(){
  if(adsManager){adsManager.destroy(); adsManager=null;}
  clearInterval(timerInterval);
  adIndex=0;
}

function requestAd(){
  let video=document.getElementById("video");
  let adContainer=document.getElementById("adContainer");
  adContainer.innerHTML="";

  let uid=localStorage.getItem("uid")||("uid"+Math.floor(Math.random()*999999999));
  localStorage.setItem("uid",uid);
  let device=/Android|iPhone/i.test(navigator.userAgent)?"mobile":"desktop";
  let domain=window.location.hostname;

  let vastUrl="https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll"
    +"&age_value=18"
    +"&broadcast_type=ott"
    +"&client_id="+uid
    +"&domain="+domain
    +"&device_type=NCWEB"
    +"&web_client_type="+device
    +"&cb="+Date.now()
    +"&rnd="+Math.floor(Math.random()*9999999);

  adDisplayContainer=new google.ima.AdDisplayContainer(adContainer,video);
  adsLoader=new google.ima.AdsLoader(adDisplayContainer);

  adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,onAdsManagerLoaded);
  adsLoader.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR,onAdError);

  let adsRequest=new google.ima.AdsRequest();
  adsRequest.adTagUrl=vastUrl;
  adsRequest.linearAdSlotWidth=window.innerWidth;
  adsRequest.linearAdSlotHeight=window.innerHeight;

  adsLoader.requestAds(adsRequest);
  adDisplayContainer.initialize();
}

function onAdsManagerLoaded(event){
  let video=document.getElementById("video");
  adsManager=event.getAdsManager(video);
  adsManager.init(window.innerWidth,window.innerHeight,google.ima.ViewMode.NORMAL);
  adsManager.start();
  adsManager.addEventListener(google.ima.AdEvent.Type.COMPLETE,nextAd);
  adsManager.addEventListener(google.ima.AdEvent.Type.STARTED,startTimer);
}

function startTimer(){
  let timer=document.getElementById("timer");
  setTimeout(()=>{document.getElementById("skipAd").style.display="block";},5000);
  timerInterval=setInterval(()=>{
    if(!adsManager)return;
    let remain=Math.round(adsManager.getRemainingTime());
    timer.innerText="Реклама: "+remain+" сек";
    if(remain<=0) clearInterval(timerInterval);
  },500);
}

function nextAd(){
  clearInterval(timerInterval);
  document.getElementById("skipAd").style.display="none";
  adIndex++;
  if(adIndex<prerollCount){
    requestAd();
  }else{
    startBuffer();
  }
}

function skipAd(){ nextAd(); }

function startBuffer(){
  document.getElementById("message").style.display="none";
  document.getElementById("buffering").style.display="block";
  setTimeout(()=>{
    requestAd(); // midroll
    startContent();
  },3000);
}

function startContent(){
  document.getElementById("buffering").style.display="none";
  midrollTimer=setTimeout(()=>{ requestAd(); },10000); // midroll
  autoNext();
}

function autoNext(){
  setTimeout(()=>{
    currentPoster++;
    if(currentPoster>=posters.length){currentPoster=0;}
    startCinema(currentPoster);
  },20000);
}

function toggleSound(){
  let video=document.getElementById("video");
  video.muted=!video.muted;
}

function onAdError(){ nextAd(); }

function closePlayer(){
  document.getElementById("playerModal").style.display="none";
  resetAds();
}
</script>

</body>
</html>
