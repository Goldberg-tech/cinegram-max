<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Кинотеатр</title>
<style>
body { margin:0; background:#0f0f0f; color:white; font-family:Arial; }
h1 { padding:20px; margin:0; }
.vitrina { display:flex; gap:20px; overflow-x:auto; padding:20px; }
.vitrina::-webkit-scrollbar{ display:none; }
.card{ min-width:65vw; cursor:pointer; }
.card img{ width:65vw; height:90vw; object-fit:cover; border-radius:20px; }
.title{ margin-top:10px; font-size:18px; }
#playerModal { position:fixed; top:0; left:0; width:100%; height:100%; background:black; display:none; align-items:center; justify-content:center; z-index:9999; flex-direction:column; }
#videoContainer { width:100%; max-width:900px; position:relative; }
video { width:100%; height:auto; background:black; }
.close { position:absolute; top:20px; right:25px; font-size:35px; cursor:pointer; z-index:10000; }
#adText { margin-bottom:10px; font-size:18px; color:white; }
#skipAd { position:absolute; bottom:20px; right:20px; background:#ff0000; border:none; padding:10px 16px; color:white; border-radius:8px; display:none; z-index:9999; }
#soundBtn { position:absolute; top:20px; right:20px; background:black; color:white; border:none; padding:8px 12px; border-radius:6px; z-index:9999; }
</style>
</head>
<body>

<h1>Сериалы</h1>
<div class="vitrina">
  <div class="card" onclick="playAd()"><img src="posters/molodezhka.jpg"><div class="title">Молодежка</div></div>
  <div class="card" onclick="playAd()"><img src="posters/kuhnya.jpg"><div class="title">Кухня</div></div>
  <div class="card" onclick="playAd()"><img src="posters/grand.jpg"><div class="title">Гранд</div></div>
  <div class="card" onclick="playAd()"><img src="posters/deti-peremen.jpg"><div class="title">Дети перемен</div></div>
  <div class="card" onclick="playAd()"><img src="posters/slovo-pacana.jpg"><div class="title">Слово пацана</div></div>
  <div class="card" onclick="playAd()"><img src="posters/obnalshik.jpg"><div class="title">Обнальщик</div></div>
</div>

<div id="playerModal">
  <div class="close" onclick="closePlayer()">×</div>
  <div id="adText">Просмотр начнется после рекламы</div>
  <div id="videoContainer">
    <button id="soundBtn" onclick="toggleSound()">🔇 Включить звук</button>
    <video id="video" playsinline autoplay muted></video>
    <button id="skipAd" onclick="skipAd()">Пропустить</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const playerModal = document.getElementById("playerModal");
let adIndex = 0;
const maxAds = 3;
let adsList = []; // сюда mp4
let currentAd = null;

// cachebuster
function generateCachebuster(){ return Date.now() + Math.floor(Math.random()*1000000); }

function playAd(){
    adIndex = 0;
    playerModal.style.display="flex";
    video.muted = true;
    video.pause();
    video.src="";
    loadAds();
}

// добавьте реальные mp4 ссылки здесь
function loadAds(){
    adsList = [];
    for(let i=0;i<maxAds;i++){
        adsList.push("https://storage.wink.ru/test_ad.mp4?cb="+generateCachebuster());
    }
    playNextAd();
}

function playNextAd(){
    if(adIndex >= adsList.length){ closePlayer(); return; }
    currentAd = adsList[adIndex];
    video.src = currentAd;
    video.load();
    video.play();
    document.getElementById("skipAd").style.display="block";

    video.onended = ()=>{
        adIndex++;
        playNextAd();
    };
}

function skipAd(){
    adIndex++;
    playNextAd();
}

function toggleSound(){
    video.muted = !video.muted;
    document.getElementById("soundBtn").innerText = video.muted ? "🔇 Включить звук" : "🔊 Выключить звук";
}

function closePlayer(){
    video.pause();
    video.src="";
    playerModal.style.display="none";
    document.getElementById("skipAd").style.display="none";
}
</script>

</body>
</html>
