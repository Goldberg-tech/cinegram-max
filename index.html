<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ad Player</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
}

#openBtn{
margin:40px;
padding:15px 30px;
font-size:18px;
cursor:pointer;
}

#playerOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#playerBox{
position:relative;
width:80%;
max-width:900px;
background:black;
}

#closeBtn{
position:absolute;
top:-40px;
right:0;
font-size:30px;
cursor:pointer;
}

video{
width:100%;
height:auto;
display:block;
}
</style>
</head>

<body>

<button id="openBtn">Открыть рекламу</button>

<div id="playerOverlay">
<div id="playerBox">

<div id="closeBtn">✕</div>

<video id="adVideo" playsinline></video>

</div>
</div>

<script>

const overlay = document.getElementById("playerOverlay")
const video = document.getElementById("adVideo")
const openBtn = document.getElementById("openBtn")
const closeBtn = document.getElementById("closeBtn")

/* ВАЖНО: вставь сюда свой рекламный файл */
const AD_URL = "ad.mp4"

openBtn.onclick = () => {

overlay.style.display = "flex"

video.src = AD_URL
video.currentTime = 0

video.play().catch(e=>{
console.log("autoplay blocked",e)
})

}

closeBtn.onclick = () => {

video.pause()
overlay.style.display = "none"

}

video.onended = () => {

overlay.style.display = "none"

}

</script>

</body>
</html>
