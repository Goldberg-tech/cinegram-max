<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Кинотеатр</title>

<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

<style>

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial;
}

h1{
padding:20px;
margin:0;
}

.vitrina{
display:flex;
gap:20px;
overflow-x:auto;
padding:20px;
}

.vitrina::-webkit-scrollbar{
display:none;
}

.card{
min-width:65vw;
cursor:pointer;
}

.card img{
width:65vw;
height:90vw;
object-fit:cover;
border-radius:20px;
}

.title{
margin-top:10px;
font-size:18px;
}

#playerModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#videoContainer{
width:100%;
max-width:900px;
position:relative;
}

video{
width:100%;
height:auto;
}

#adContainer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:35px;
cursor:pointer;
z-index:10000;
}

#adText{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:10px 15px;
border-radius:10px;
z-index:9999;
}

#adTimer{
position:absolute;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:8px 12px;
border-radius:8px;
font-size:14px;
z-index:9999;
}

#skipAd{
position:absolute;
bottom:20px;
right:20px;
background:#ff0000;
border:none;
padding:10px 16px;
color:white;
border-radius:8px;
display:none;
z-index:9999;
}

</style>

</head>

<body>

<h1>Сериалы</h1>

<div class="vitrina">

<div class="card" onclick="playAd()">
<img src="posters/molodezhka.jpg">
<div class="title">Молодежка</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/kuhnya.jpg">
<div class="title">Кухня</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/grand.jpg">
<div class="title">Гранд</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/deti-peremen.jpg">
<div class="title">Дети перемен</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/slovo-pacana.jpg">
<div class="title">Слово пацана</div>
</div>

<div class="card" onclick="playAd()">
<img src="posters/obnalshik.jpg">
<div class="title">Обнальщик</div>
</div>

</div>

<div id="playerModal">

<div class="close" onclick="closePlayer()">×</div>

<div id="videoContainer">

<div id="adText">Просмотр начнется после рекламы</div>

<video id="video" playsinline webkit-playsinline autoplay muted></video>

<div id="adContainer"></div>

<div id="adTimer"></div>

<button id="skipAd" onclick="skipAd()">Пропустить</button>

</div>

</div>

<script>

let adCount = 0
let maxAds = 3

let video = document.getElementById("video")

function playAd(){

adCount = 0

document.getElementById("playerModal").style.display="flex"

startAd()

}

async function startAd(){

let uid = localStorage.getItem("uid")

if(!uid){

uid = "uid"+Math.floor(Math.random()*999999999)

localStorage.setItem("uid",uid)

}

let device = /Android|iPhone/i.test(navigator.userAgent) ? "mobile" : "desktop"

let domain = window.location.hostname

let vastUrl =
"https://ssp.wink.ru/v1/rt/avod/vast?ad_place_type=preroll"
+"&age_value=18"
+"&broadcast_type=ott"
+"&client_id="+uid
+"&client_version="
+"&domain="+domain
+"&embedded=P5"
+"&is_child=false"
+"&is_paid=0"
+"&location=100001"
+"&san=web_vast_code"
+"&ad_position=1"
+"&content_id=23080"
+"&device_type=NCWEB"
+"&web_client_type="+device
+"&cb="+Date.now()
+"&rnd="+Math.floor(Math.random()*999999999)

try{

let response = await fetch(vastUrl)

let xmlText = await response.text()

let parser = new DOMParser()

let xml = parser.parseFromString(xmlText,"text/xml")

let mediaFile = xml.querySelector("MediaFile")

if(!mediaFile){

console.log("Нет MediaFile")

closePlayer()

return

}

let videoUrl = mediaFile.textContent.trim()

video.src = videoUrl

video.play()

startTimer()

}catch(e){

console.log("VAST error",e)

closePlayer()

}

}

function startTimer(){

let timer = document.getElementById("adTimer")

document.getElementById("skipAd").style.display="block"

let interval = setInterval(()=>{

if(video.duration){

let remaining = Math.round(video.duration - video.currentTime)

timer.innerText = "Реклама: "+remaining+" сек"

}

},500)

video.onended = ()=>{

clearInterval(interval)

adCount++

if(adCount < maxAds){

startAd()

}else{

closePlayer()

}

}

}

function skipAd(){

video.pause()

adCount++

if(adCount < maxAds){

startAd()

}else{

closePlayer()

}

}

function closePlayer(){

document.getElementById("playerModal").style.display="none"

video.pause()

video.src=""

}

</script>

</body>

</html>
