<!DOCTYPE html>
<html>
<head>

<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

<style>

#videoContainer{
position:relative;
width:800px;
margin:auto;
}

#videoPlayer{
width:100%;
}

#adContainer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

#playButton{
margin-top:20px;
}

</style>
</head>

<body>

<div id="videoContainer">

<video id="videoPlayer" controls>

<source src="content.mp4" type="video/mp4">

</video>

<div id="adContainer"></div>

</div>

<button id="playButton">Play</button>

<script>

const video = document.getElementById("videoPlayer")
const adContainer = document.getElementById("adContainer")
const playButton = document.getElementById("playButton")

let adsLoader
let adsManager
let adDisplayContainer

function initIMA(){

adDisplayContainer = new google.ima.AdDisplayContainer(
adContainer,
video
)

adsLoader = new google.ima.AdsLoader(adDisplayContainer)

adsLoader.addEventListener(
google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
onAdsManagerLoaded,
false
)

adsLoader.addEventListener(
google.ima.AdErrorEvent.Type.AD_ERROR,
onAdError,
false
)

}

function requestAds(){

const vastUrl = "https://adserver.com/vast.xml"

const proxyUrl =
"http://localhost:3000/vast?url=" + encodeURIComponent(vastUrl)

const adsRequest = new google.ima.AdsRequest()

adsRequest.adTagUrl = proxyUrl

adsRequest.linearAdSlotWidth = 800
adsRequest.linearAdSlotHeight = 450

adsRequest.nonLinearAdSlotWidth = 800
adsRequest.nonLinearAdSlotHeight = 150

adsLoader.requestAds(adsRequest)

}

function onAdsManagerLoaded(event){

const adsRenderingSettings =
new google.ima.AdsRenderingSettings()

adsRenderingSettings.restoreCustomPlaybackStateOnAdBreakComplete = true

adsManager =
event.getAdsManager(video, adsRenderingSettings)

adsManager.addEventListener(
google.ima.AdErrorEvent.Type.AD_ERROR,
onAdError
)

adsManager.addEventListener(
google.ima.AdEvent.Type.CONTENT_PAUSE_REQUESTED,
() => {
video.pause()
}
)

adsManager.addEventListener(
google.ima.AdEvent.Type.CONTENT_RESUME_REQUESTED,
() => {
video.play()
}
)

startAds()

}

function startAds(){

try{

adsManager.init(800,450,google.ima.ViewMode.NORMAL)

adsManager.start()

}catch(e){

video.play()

}

}

function onAdError(error){

console.log("Ad error", error)

if(adsManager){
adsManager.destroy()
}

video.play()

}

playButton.addEventListener("click", () => {

adDisplayContainer.initialize()

initIMA()

requestAds()

})

</script>

</body>
</html>
